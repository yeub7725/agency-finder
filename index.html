<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="utf-8">
    <title>관할기관 통합 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: rgb(0, 55, 100);
            --gov-red: rgb(228, 3, 45);
            --gov-gray-std: rgb(87, 87, 87); 
            --gov-gray: rgb(30, 41, 59);
            --gov-light-gray: rgb(100, 116, 139);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background: #fff; }
        .main-wrapper { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar-search { 
            width: 440px; min-width: 440px; border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; background: #fff; height: 100%; 
        }
        
        .search-header { padding: 8px 20px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
        h1 { font-size: 1.1rem; margin: 0 0 5px 0; color: var(--gov-blue); font-weight: 900; }
        
        .search-row { display: flex; gap: 8px; width: 100%; align-items: center; }
        .search-container { flex: 1.8; position: relative; }
        input#keyword { width: 100%; padding: 8px; font-size: 14px; border: 2px solid var(--gov-blue); border-radius: 4px; outline: none; box-sizing: border-box; }
        
        .date-group { display: flex; align-items: center; border: 2px solid #94a3b8; border-radius: 4px; padding: 0 5px; height: 35px; flex: 1; box-sizing: border-box; justify-content: center; }
        .date-group input { width: 25px; border: none !important; text-align: center; font-size: 13px; font-weight: bold; color: var(--gov-blue); outline: none; background: transparent; }

        #result-area { flex: 1; overflow-y: auto; padding: 5px 15px; display: flex; flex-direction: column; }
        #sub-info-area { display: flex; flex-direction: column; gap: 10px; } 

        #office-list { display: flex; flex-direction: column; }
        .intro-msg { text-align: center; color: #64748b; opacity: 0.5; margin-top: 150px; font-size: 16px; }

        .section-title { font-size: 14px; font-weight: 800; color: var(--gov-gray); margin: 5px 0 2px 0; display: flex; align-items: center; gap: 5px; }
        .section-title::before { content: ''; width: 3px; height: 12px; background: var(--gov-blue); }

        .office-card.recommend { 
            border: 2px solid var(--gov-blue); background: #f8fbff; 
            padding: 6px 12px; border-radius: 6px; margin-bottom: 5px; 
            display: flex; flex-direction: column; 
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .office-name { font-size: 16.5px; font-weight: 900; color: var(--gov-blue); letter-spacing: -0.5px; }
        .meta-info { text-align: right; white-space: nowrap; }
        .zone-text { font-size: 11px; color: var(--gov-light-gray); font-weight: 700; margin-right: 5px; }
        .dist-text { font-size: 12px; color: var(--gov-blue); font-weight: 800; } 
        
        .phone-text { font-size: 26px; font-weight: 900; color: var(--gov-red); margin: -2px 0 0px 0; line-height: 1; letter-spacing: -1px; }
        .addr-text { font-size: 12px; color: var(--gov-gray); margin: 3px 0 0 0; border-top: 1px solid #eef2f6; padding-top: 3px; line-height: 1.2; }
        
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 6px; }
        .contact-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px dotted #e2e8f0; font-size: 13.5px; align-items: center; white-space: nowrap; }
        .contact-item:last-child { border-bottom: none; }
        
        .gov-std-text { color: var(--gov-gray-std); font-weight: 800; }
        .contact-item b { color: var(--gov-red); font-weight: 900; font-size: 14px; }
        .sub-desc { font-size: 11px; color: #64748b; margin-left: 3px; font-weight: normal; }

        #addressList { position: absolute; top: 100%; left: 0; width: 100%; border: 2px solid var(--gov-blue); background: white; z-index: 1000; display: none; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-item { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; text-align: left; }
        .search-item.active { background-color: #e2e8f0 !important; font-weight: 800; }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div id="sidebar-search">
        <div class="search-header">
            <h1>관할기관 통합 검색</h1>
            <div class="search-row">
                <div class="search-container">
                    <input id="keyword" placeholder="주소 입력" autocomplete="off">
                    <div id="addressList"></div>
                </div>
                <div class="date-group">
                    <input type="text" id="yy" placeholder="YY" maxlength="2"><span>/</span>
                    <input type="text" id="mm" placeholder="MM" maxlength="2"><span>/</span>
                    <input type="text" id="dd" placeholder="DD" maxlength="2">
                </div>
            </div>
        </div>
        <div id="result-area">
            <div id="rec-section"><p class="intro-msg">주소를 입력해주세요.</p></div>
            <div id="sub-info-area" style="display:none;">
                <div id="office-list"></div>
                
                <div id="bottom-static-info">
                    <div class="section-title">신청 시 필요 서류</div>
                    <div class="info-box">
                        <div class="contact-item"><span style="font-size:13px;">• <b class="gov-std-text">공통:</b> 신분증, 등본, 초본, 건축물대장, 계약서</span></div>
                        <div class="contact-item"><span style="font-size:13px;">• <b class="gov-std-text">대리:</b> 위임장, 인감증명서, 대리인 신분증</span></div>
                    </div>

                    <div class="section-title">주요 업무 문의처</div>
                    <div class="info-box">
                        <div class="contact-item"><span>한국부동산원<span class="sub-desc">(1.공시 3.K-아파트 0.기타)</span></span><b>1600-2828</b></div>
                        <div class="contact-item"><span>전자계약</span><b>1833-4662</b></div>
                        <div class="contact-item"><span>임대차신고</span><b>1533-2949</b></div>
                        <div class="contact-item"><span>LH공사</span><b>1600-1004</b></div>
                        <div class="contact-item"><span>렌트홈</span><b>1670-8004</b></div>
                        <div class="contact-item"><span>공동주택 조정위<span class="sub-desc">(장기수선·관리비)</span></span><b>031-738-3300</b></div>
                        <div class="contact-item"><span>국토부</span><b>1599-0001</b></div>
                        <div class="contact-item"><span>대법공</span><b>132</b></div>
                        <div class="contact-item"><span>국세청</span><b>126</b></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d791798c38589fc7cdc6bce91d9369be&libraries=services"></script>
<script>
const offices = [
    {name:"한국부동산원 서울동부지사", type:"부동산원", covers:["서울", "도봉구", "강북구", "노원구", "성북구", "중랑구", "동대문구", "성동구", "광진구", "강동구"], lat:37.557698, lng:127.079226, phone:"02-3394-9870~3", address:"서울시 광진구 천호대로 549, 지타워 10층"},
    {name:"한국부동산원 고양지사", type:"부동산원", covers:["경기"], lat:37.652619, lng:126.776883, phone:"031-902-3573~5", address:"경기도 고양시 일산동구 중앙로 1187, 흥국생명빌딩 8층"},
    {name:"한국부동산원 성남지사", type:"부동산원", covers:["경기"], lat:37.411158, lng:127.128242, phone:"031-8017-8488~90", address:"경기도 성남시 분당구 야탑로 81번길 16"},
    {name:"한국부동산원 인천지사", type:"부동산원", covers:["인천"], lat:37.401035, lng:126.712020, phone:"032-429-7041~6", address:"인천시 남동구 논현로 46번길 23, 7층"},
    {name:"한국부동산원 춘천지사", type:"부동산원", covers:["강원"], lat:37.883425, lng:127.729908, phone:"033-244-9793~4", address:"강원도 춘천시 중앙로 16, 무림빌딩 7층"},
    {name:"한국부동산원 대전지사", type:"부동산원", covers:["세종"], lat:36.508069, lng:127.261123, phone:"044-868-8341", address:"세종시 한누리대로 499, 세종포스트빌딩 제302호"},
    {name:"한국부동산원 전주지사", type:"부동산원", covers:["전북"], lat:35.837688, lng:127.131437, phone:"063-276-8022~3", address:"전북 전주시 덕진구 기린대로 405, 한화생명빌딩 3층"},
    {name:"한국부동산원 포항지사", type:"부동산원", covers:["경북"], lat:36.030918, lng:129.366140, phone:"054-275-9771~2", address:"경북 포항시 북구 중앙로 201, 한화생명빌딩 8층"},
    {name:"한국부동산원 울산지사", type:"부동산원", covers:["울산"], lat:35.53823, lng:129.31132, phone:"052-224-8872~4", address:"울산시 남구 북부순환대로 17, 남운프라자 906호"},
    {name:"한국부동산원 창원지사", type:"부동산원", covers:["경남"], lat:35.218066, lng:128.675982, phone:"055-289-0136~8", address:"창원시 성산구 중앙대로 32, 2층"},
      // --- 한토공 ---
    {name:"한국토지주택공사 충북본부", type:"주택공사", covers:["충북"], lat:36.614249, lng:127.450780, phone:"043-905-1784", address:"충북 청주시 서원구 구룡산로 52번길 2, 303호"},
    {name:"한국토지주택공사 제주본부", type:"주택공사", covers:["제주"], lat:33.505062, lng:126.525532, phone:"064-901-3802", address:"제주시 중앙로 150, 대한항공제주사옥 3층"},
      // --- 대법공 ---
    {name:"대한법률구조공단 서울중앙지부", type:"대법공", covers:["서울", "금천구", "관악구", "동작구", "서초구", "강남구", "송파구"], lat:37.494383, lng:127.013104, phone:"02-6941-3430", address:"서울시 서초구 법원로 2길 21, 칠보빌딩 1층"},
    {name:"대한법률구조공단 수원지부", type:"대법공", covers:["경기", "인천"], lat:37.277533, lng:127.049515, phone:"031-8007-3430", address:"경기도 수원시 영통구 월드컵로 150번길 10, YM빌딩 3층"},
    {name:"대한법률구조공단 대전지부", type:"대법공", covers:["대전", "세종", "충남", "충북"], lat:36.356309, lng:127.387871, phone:"042-721-3430", address:"대전시 서구 둔산북로 121, 1층 117~121호"},
    {name:"대한법률구조공단 대구지부", type:"대법공", covers:["대구", "경북"], lat:35.859195, lng:128.631891, phone:"053-710-3430", address:"대구시 수성구 달구벌대로 2461, 디에스라이프빌딩 3층"},
    {name:"대한법률구조공단 부산지부", type:"대법공", covers:["부산", "울산", "경남"], lat:35.190787, lng:129.074010, phone:"051-711-3430", address:"부산시 연제구 법원남로 15번길 4, 성신프라이어빌딩 5층"},
    {name:"대한법률구조공단 광주지부", type:"대법공", covers:["광주", "전남", "전북", "제주"], lat:35.149140, lng:126.848917, phone:"062-710-3430", address:"광주시 서구 상무중앙로 28번길 4, 세진빌딩 4층 401호"},
     // --- 지자체 ---
    {name:"서울시청 (지자체)", type:"지자체", covers:["서울", "강서구", "은평구", "종로구", "서대문구", "마포구", "영등포구", "양천구", "구로구"], lat:37.564554, lng:126.975613, phone:"02-2133-1200~8", address:"서울시 중구 덕수궁길 15, 서울시청 서소문별관"},
    {name:"경기도청 (지자체)", type:"지자체", covers:["경기"], lat:37.274666, lng:127.009619, phone:"031-8008-2868", address:"경기도 수원시 팔달구 효원로 1"}
];
let currentAddressResults = [];
    let focusedIndex = -1;
    let debounceTimer;
    let lastSearchKeyword = "";
    let isNavigating = false; 

    const keywordInput = document.getElementById("keyword");
    const addressList = document.getElementById("addressList");

    function searchAddress() {
        const keyword = keywordInput.value.trim();
        if (isNavigating || !keyword || keyword === lastSearchKeyword) return;
        if (keyword.length < 2) { addressList.style.display = "none"; return; }
        const geocoder = new kakao.maps.services.Geocoder();
        geocoder.addressSearch(keyword, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                currentAddressResults = result;
                addressList.innerHTML = "";
                addressList.style.display = "block";
                focusedIndex = -1; 
                result.forEach((item, idx) => {
                    const div = document.createElement("div");
                    div.className = "search-item";
                    div.innerHTML = item.address_name;
                    div.onmousedown = (e) => { e.preventDefault(); selectItem(item); };
                    addressList.appendChild(div);
                });
            }
        });
    }

    function selectItem(item) {
        if (!item) return;
        addressList.style.display = "none";
        keywordInput.value = item.address_name;
        lastSearchKeyword = item.address_name;
        document.getElementById("rec-section").style.display = "none";
        document.getElementById("sub-info-area").style.display = "flex";
        findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
    }

    function findNearest(lat, lng, fullAddress) {
        const addrParts = fullAddress.split(' ');
        const mySido = addrParts[0].substring(0, 2); 
        const myGu = addrParts.find(p => p.endsWith('구')) || "";

        // 1. 관할 필터링 및 점수화
        let filtered = offices.map(o => {
            const dist = getDistance(lat, lng, o.lat, o.lng);
            const hasSido = o.covers.includes(mySido);
            const hasGu = myGu && o.covers.includes(myGu);
            
            // 점수 시스템: 구 일치(100점), 시도 일치(50점), 타지역(0점)
            let score = 0;
            if (hasGu) score = 100;
            else if (hasSido) score = 50;

            let displayCover = o.type === "대법공" && o.covers.includes("서울") ? "서울·강원" : (o.covers.includes("서울") ? "서울" : (o.covers[0] || ""));
            
            return { ...o, dist, score, displayCover };
        });

        // 2. 검색 로직 적용
        let finalResults = [];
        if (mySido === "서울") {
            // 서울은 1순위 구 일치, 2순위 가까운 서울 관할
            finalResults = filtered
                .filter(o => o.score > 0)
                .sort((a, b) => b.score - a.score || a.dist - b.dist)
                .slice(0, 2);
        } else {
            // 지방은 해당 지사 관할(score > 0)만 보여줌 (서울 지사 노출 차단)
            finalResults = filtered
                .filter(o => o.score > 0)
                .sort((a, b) => b.score - a.score || a.dist - b.dist);
            
            // 지방에서 관할이 1개만 있으면 1개만 출력 (불필요한 타지사 제거)
            if (finalResults.length > 1) {
                // 만약 정확히 '구'가 일치하는 100점짜리가 있다면 그것만 보여줌
                const topScore = finalResults[0].score;
                if (topScore === 100) {
                    finalResults = finalResults.filter(o => o.score === 100).slice(0, 1);
                }
            }
        }

        displayResults(finalResults);
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function displayResults(recData) {
        const officeList = document.getElementById("office-list");
        officeList.innerHTML = `<span class="section-title">관할기관 안내</span>`;
        if (recData.length === 0) {
            officeList.innerHTML += `<p style="font-size:13px; color:#64748b; padding:10px;">해당 지역의 관할 정보를 찾을 수 없습니다.</p>`;
            return;
        }
        recData.forEach((o) => {
            officeList.innerHTML += `
                <div class="office-card recommend">
                    <div class="card-top">
                        <span class="office-name">${o.name}</span>
                        <div class="meta-info">
                            <span class="zone-text">${o.displayCover}</span>
                            <span class="dist-text">${o.dist.toFixed(1)}km</span>
                        </div>
                    </div>
                    <span class="phone-text">${o.phone}</span>
                    <p class="addr-text">${o.address}</p>
                </div>`;
        });
    }

    keywordInput.addEventListener("keydown", (e) => {
        const items = addressList.getElementsByClassName("search-item");
        if (e.key === "ArrowDown" || e.key === "ArrowUp") {
            if (items.length === 0) return;
            e.preventDefault();
            isNavigating = true; 
            if (e.key === "ArrowDown") focusedIndex = (focusedIndex + 1) % items.length;
            else focusedIndex = (focusedIndex - 1 + items.length) % items.length;
            for (let i = 0; i < items.length; i++) items[i].classList.toggle("active", i === focusedIndex);
        }
        if (e.key === "Enter" && focusedIndex > -1) selectItem(currentAddressResults[focusedIndex]);
    });

    keywordInput.addEventListener("input", () => {
        isNavigating = false; 
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(searchAddress, 200);
    });

    document.addEventListener("click", (e) => {
        if (e.target !== keywordInput) addressList.style.display = "none";
    });
</script>
</body>
</html>
