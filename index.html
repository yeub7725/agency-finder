<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>관할기관 찾기 (임대차분쟁조정지원팀)</title>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d791798c38589fc7cdc6bce91d9369be&libraries=services"></script>
<style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
    .main-wrapper { display: flex; height: 100vh; }

    /* 사이드바 영역 */
    #sidebar-search {
        width: 33.3%; min-width: 360px; border-right: 1px solid #ddd;
        padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; background-color: #f9f9f9;
    }
    
    /* 검색 결과 및 안내문구 스크롤 영역 */
    .scroll-content { flex: 1; overflow-y: auto; margin-top: 20px; padding-right: 5px; }

    #content-area { width: 66.7%; background-color: #fff; position: relative; }
    #map { width: 100%; height: 100%; }

    h1 { font-size: 1.8rem; margin-bottom: 20px; color: #222; }
    .search-container { position: relative; width: 100%; }
    
    input#keyword { 
        padding: 14px; width: 100%; font-size: 16px; 
        border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; outline: none;
    }
    input#keyword:focus { border-color: #007bff; }

    #addressList { 
        position: absolute; top: 100%; left: 0; width: 100%;
        border: 1px solid #bbb; background: white; z-index: 100;
        display: none; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        margin-top: 5px;
    }
    .search-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 15px; color: #444; }
    .search-item.active { background-color: #eef6ff; color: #007bff; font-weight: bold; border-left: 5px solid #007bff; }

    /* 결과 카드 디자인 (이전 폰트 사이즈 복구) */
    .jurisdiction-info { font-weight: bold; color: #e63946; margin-bottom: 15px; display: block; font-size: 1.1rem; }
    .office-card { border: 1px solid #e1e1e1; padding: 18px; margin-bottom: 12px; border-radius: 10px; background-color: #fff; cursor: pointer; }
    .office-card h3 { margin: 0 0 10px 0; font-size: 18px; color: #333; }
    .addr-text { font-size: 15px; color: #666; margin: 6px 0; line-height: 1.4; }
    .phone-text { font-size: 20px; font-weight: bold; color: #0056b3; margin: 8px 0; display: block; }

    /* 지자체 추천 섹션 */
    .recommend-section { margin-top: 25px; padding-top: 20px; border-top: 2px solid #ddd; }
    .recommend-title { font-size: 16px; font-weight: bold; color: #2d6a4f; margin-bottom: 12px; display: block; }
    .recommend-card { background: #f0f9f4; border: 1px solid #cce3d8; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    .recommend-card span { font-size: 15px; color: #333; font-weight: bold; display: block; }
    .recommend-card small { font-size: 13px; color: #666; margin-top: 4px; display: block; }

    /* 하단 상시 노출 안내문구 (폰트 사이즈 조정) */
    .constant-guide { margin-top: 30px; padding: 15px; background: #fff; border-radius: 10px; border: 1px solid #ddd; }
    .constant-guide
