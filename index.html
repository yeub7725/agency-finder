<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="utf-8">
    <title>관할기관 통합 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: rgb(0, 55, 100);
            --gov-red: rgb(228, 3, 45);
            --gov-gray: rgb(30, 41, 59);
            --gov-light-gray: rgb(100, 116, 139);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background: #fff; }
        
        /* 오른쪽 맵/여백 공간 확인을 위해 배경색 살짝 추가 */
        .main-wrapper { display: flex; height: 100vh; width: 100vw; background: #f8fafc; }
        
        #sidebar-search { 
            width: 40vw; min-width: 500px; max-width: 650px; 
            border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; background: #fff; height: 100%; position: relative;
        }
        
        /* 헤더 아래 여백을 원래대로 깔끔하게 복구 */
        .search-header { padding: 15px 20px 20px 20px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; position: relative; z-index: 1000; }
        h1 { font-size: 1.1rem; margin: 0 0 12px 0; color: var(--gov-blue); font-weight: 900; }
        
        .search-row { 
            display: flex; align-items: center; width: 100%; 
            border: 2px solid var(--gov-blue); border-radius: 4px; 
            background: #fff; box-sizing: border-box; height: 40px;
            position: relative; 
        }
        
        .search-container { flex: 1.8; }
        input#keyword { width: 100%; padding: 0 12px; font-size: 14px; border: none; outline: none; background: transparent; }
        
        #addressList { 
            position: absolute; top: calc(100%); left: -2px; width: calc(100% + 4px); 
            border: 2px solid var(--gov-blue); border-top: 1px solid #eee; border-radius: 0 0 4px 4px;
            background: white; z-index: 9999; display: none; box-sizing: border-box; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .search-item { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; text-align: left; color: #333; }
        .search-item:hover, .search-item.active { background-color: #f0f7ff !important; font-weight: 700; color: var(--gov-blue); }
        .search-item:last-child { border-bottom: none; }

        .date-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #fff; height: 100%; }
        .date-group { display: flex; align-items: center; gap: 1px; }
        .date-group input { width: 22px; border: none !important; text-align: center; font-size: 13px; font-weight: bold; color: var(--gov-blue); outline: none; background: transparent; padding: 0; }
        .date-group span { color: #cbd5e1; font-weight: bold; font-size: 12px; }

        .price-container { 
            flex: 2; display: flex; align-items: center; justify-content: flex-end;
            padding: 0 10px; background: #fff; height: 100%; 
        }
        .price-input-wrap { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
        .price-input-wrap input { width: 55px; border: none; outline: none; font-size: 12px; font-weight: 700; color: var(--gov-gray); text-align: right; background: transparent; }
        .price-unit { font-size: 12px; color: var(--gov-gray); font-weight: 700; white-space: nowrap; flex-shrink: 0; }
        .price-slash { color: #e2e8f0; margin: 0 6px; flex-shrink: 0; }

        /* ✨ 수정: 우측 밖으로 위치 이동, 진한 굵은 선, 텍스트 아래쪽 중앙 정렬 */
        #date-visual-line { 
            visibility: hidden; 
            position: absolute; 
            left: calc(100% + 40px); /* 검색창 오른쪽 밖으로 40px 떨어트림 */
            top: 65px; /* 검색바 세로 중앙과 얼추 맞춤 */
            width: 250px; 
            height: 30px;
            z-index: 1000;
        }
        .line-bar { 
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px; /* 선 굵기 증가 */
            background: var(--gov-blue); /* 아주 진한 색상으로 눈에 띄게 */
        }
        .line-bar::before, .line-bar::after { 
            content: ''; position: absolute; top: -5px; width: 2px; height: 12px; background: var(--gov-blue); 
        }
        .line-bar::before { left: 0; }
        .line-bar::after { right: 0; }

        .date-label { 
            position: absolute; 
            top: 14px; /* 선의 아래쪽에 배치 */
            font-size: 13px; 
            font-weight: 900; 
            color: var(--gov-blue); 
            transform: translateX(-50%); /* 정확한 중앙 정렬을 위한 이동 */
            white-space: nowrap;
        }
        /* 각 텍스트를 선의 시작점(0)과 끝점(100%)에 위치 */
        #before-date-val { left: 0; } 
        #after-date-val { left: 100%; }

        #result-area { flex: 1; overflow-y: auto; padding: 5px 15px; display: flex; flex-direction: column; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--gov-gray); margin: 5px 0 2px 0; display: flex; align-items: center; gap: 5px; }
        .section-title::before { content: ''; width: 3px; height: 12px; background: var(--gov-blue); }

        .office-card.recommend { border: 2px solid var(--gov-blue); background: #f8fbff; padding: 10px 12px; border-radius: 6px; margin-bottom: 5px; display: flex; flex-direction: column; }

        .office-name { font-size: 16.5px; font-weight: 900; color: var(--gov-blue); letter-spacing: -0.5px; }

        .addr-text { font-size: 12px; color: var(--gov-gray); margin: 5px 0 0 0; border-top: 1px solid #eef2f6; padding-top: 5px; line-height: 1.2; }

    </style>
</head>

let currentAddressResults = [];
let focusedIndex = -1;
let debounceTimer;
let lastSearchKeyword = "";
let isNavigating = false; 

const keywordInput = document.getElementById("keyword");
const addressList = document.getElementById("addressList");
const dateInputs = [document.getElementById("yy"), document.getElementById("mm"), document.getElementById("dd")];
const depositInput = document.getElementById("deposit");
const rentInput = document.getElementById("rent");
const visualLine = document.getElementById("date-visual-line");
const beforeDateVal = document.getElementById("before-date-val");
const afterDateVal = document.getElementById("after-date-val");

function calculateTwoYears() {
    let y = dateInputs[0].value, m = dateInputs[1].value, d = dateInputs[2].value;
    if (y.length === 2 && m.length === 2 && d.length === 2) {
        let numM = parseInt(m), numD = parseInt(d);
        if (numM < 1 || numM > 12 || numD < 1 || numD > 31) { visualLine.style.visibility = "hidden"; return; }
        let fullYear = parseInt(y) > 50 ? 1900 + parseInt(y) : 2000 + parseInt(y);
        let dateObj = new Date(fullYear, numM - 1, numD);
        if (dateObj.getMonth() !== numM - 1) { visualLine.style.visibility = "hidden"; return; }

        beforeDateVal.innerText = `${y}.${String(numM).padStart(2, '0')}.${String(numD).padStart(2, '0')}`;
        dateObj.setFullYear(dateObj.getFullYear() + 2);
        afterDateVal.innerText = `${String(dateObj.getFullYear()).slice(-2)}.${String(dateObj.getMonth() + 1).padStart(2, '0')}.${String(dateObj.getDate()).padStart(2, '0')}`;
        visualLine.style.visibility = "visible";
    } else { visualLine.style.visibility = "hidden"; }
}

dateInputs.forEach((input, idx) => {
    input.addEventListener("input", () => {
        let val = input.value.replace(/[^0-9]/g, "");
        input.value = val;
        if (val.length === 2) {
            if (idx === 1) { if (parseInt(val) > 12) input.value = "12"; if (parseInt(val) === 0) input.value = "01"; }
            if (idx === 2) { if (parseInt(val) > 31) input.value = "31"; if (parseInt(val) === 0) input.value = "01"; }
            if (idx < 2) dateInputs[idx + 1].focus();
            else depositInput.focus();
        }
        calculateTwoYears();
    });
});

[depositInput, rentInput].forEach(input => {
    input.addEventListener("input", (e) => {
        let val = e.target.value.replace(/[^0-9]/g, "");
        e.target.value = val ? Number(val).toLocaleString() : "";
    });
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && input === depositInput) rentInput.focus();
    });
});

function searchAddress() {
    const keyword = keywordInput.value.trim();
    if (isNavigating || !keyword || keyword === lastSearchKeyword) return;
    if (keyword.length < 2) { addressList.style.display = "none"; return; }
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, function(result, status) {
        if (status === kakao.maps.services.Status.OK) {
            currentAddressResults = result;
            addressList.innerHTML = "";
            addressList.style.display = "block";
            focusedIndex = -1;
            result.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerText = item.address_name;
                
                div.onmouseenter = () => {
                    focusedIndex = idx;
                    Array.from(addressList.children).forEach((child, i) => {
                        child.classList.toggle("active", i === focusedIndex);
                    });
                };

                div.onmousedown = (e) => { e.preventDefault(); selectItem(item); };
                addressList.appendChild(div);
            });
        }
    });
}

function selectItem(item) {
    if (!item) return;
    addressList.style.display = "none";
    keywordInput.value = item.address_name;
    lastSearchKeyword = item.address_name;
    document.getElementById("rec-section").style.display = "none";
    document.getElementById("sub-info-area").style.display = "block";
    
    // ✨ 수정: 주소 입력 후 포커스가 자동으로 날짜 칸으로 넘어가지 않도록 삭제 (커서 주소창에 유지)
    
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function findNearest(lat, lng, fullAddress) {
    const addrParts = fullAddress.split(' ');
    const mySido = addrParts[0].substring(0, 2);
    const myGu = addrParts.find(p => p.endsWith('구')) || "";
    let filtered = offices.map(o => {
        const dist = getDistance(lat, lng, o.lat, o.lng);
        const hasSido = o.covers.includes(mySido);
        const hasGu = myGu && o.covers.includes(myGu);
        let score = hasGu ? 100 : (hasSido ? 50 : 0);
        let displayCover = o.covers.includes("서울") ? "서울" : (o.covers[0] || "");
        return { ...o, dist, score, displayCover };
    });
    let finalResults = (mySido === "서울") ? 
        filtered.filter(o => o.score > 0).sort((a, b) => b.score - a.score || a.dist - b.dist).slice(0, 2) :
        filtered.filter(o => o.score > 0).sort((a, b) => b.score - a.score || a.dist - b.dist).slice(0, 1);
    displayResults(finalResults);
}

function displayResults(recData) {
    const officeList = document.getElementById("office-list");
    officeList.innerHTML = `<span class="section-title">관할기관 안내</span>`;
    recData.forEach((o) => {
        let displayName = o.name.includes("(지자체)") ? o.name.replace("(지자체)", `<span class="office-name-sub">(지자체)</span>`) : o.name;
        officeList.innerHTML += `
            <div class="office-card recommend">
                <div class="card-top">
                    <span class="office-name">${displayName}</span>
                    <div class="meta-info">
                        <span class="zone-text">${o.displayCover}</span> <span class="dist-text">(${o.dist.toFixed(1)}km)</span>
                    </div>
                </div>
                <div class="phone-row">
                    <span class="phone-text">${o.phone}</span>
                    <span class="sms-tag">${o.type === "지자체" ? "문자 X" : "문자 O"}</span>
                </div>
                <p class="addr-text">${o.address}</p>
            </div>`;
    });
}

keywordInput.addEventListener("keydown", (e) => {
    const items = addressList.getElementsByClassName("search-item");
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        if (items.length === 0) return;
        e.preventDefault();
        isNavigating = true; 
        
        if (e.key === "ArrowDown") {
            focusedIndex = (focusedIndex + 1) % items.length;
        } else {
            focusedIndex = (focusedIndex - 1 + items.length) % items.length;
        }

        Array.from(items).forEach((item, i) => {
            item.classList.toggle("active", i === focusedIndex);
        });
        
        if(focusedIndex > -1) {
            keywordInput.value = currentAddressResults[focusedIndex].address_name;
        }
    }
    if (e.key === "Enter") {
        e.preventDefault();
        if (focusedIndex > -1 && currentAddressResults[focusedIndex]) {
            selectItem(currentAddressResults[focusedIndex]);
        } else if (items.length > 0) {
            selectItem(currentAddressResults[0]);
        }
    }
});

keywordInput.addEventListener("input", () => {
    isNavigating = false; 
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(searchAddress, 200);
});

document.addEventListener("click", (e) => {
    if (!e.target.closest('.search-row')) addressList.style.display = "none";
});
</script>
</body>
