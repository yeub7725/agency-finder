            currentAddressResults = result;
            if(isEnterPressed) { selectItem((focusedIndex > -1) ? result[focusedIndex] : result[0]); return; }
            listEl.innerHTML = ""; listEl.style.display = "block";
            result.forEach((item) => {
                const div = document.createElement("div"); div.className = "search-item";
                div.innerHTML = item.address_name;
                div.onmousedown = (e) => { e.preventDefault(); selectItem(item); };
                listEl.appendChild(div);
            });
            if(focusedIndex !== -1) updateFocus(listEl.getElementsByClassName("search-item"));
        }
    });
}

function selectItem(item) {
    if(!item) return;
    document.getElementById("addressList").style.display = "none";
    document.getElementById("keyword").value = item.address_name;
    document.getElementById("sub-info-area").style.display = "block";
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
    focusedIndex = -1;
}

function getDistance(lat1, lon1, lat2, lon2){
    if(!lat1 || !lon1 || !lat2 || !lon2) return null;
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function findNearest(lat, lng, fullAddress){
    const addrParts = fullAddress.split(' ');
    const city = addrParts[0].substring(0, 2); 
    const district = addrParts.find(p => p.endsWith('구') || p.endsWith('군') || p.endsWith('시')) || "";

    const checkMatch = (office) => {
        if (!office || !office.covers || !Array.isArray(office.covers)) return false;
        return office.covers.some(c => fullAddress.includes(c) || district.includes(c) || city.includes(c));
    };

    const getPriority = (type) => {
        if (type === "부동산원") return 40;
        if (type === "대법공") return 30;
        if (type === "주택공사") return 20;
        if (type === "지자체") return 10;
        return 0;
    };

    const recTargets = offices
        .filter(o => ["부동산원", "대법공", "주택공사", "지자체"].includes(o.type))
        .map(o => ({ 
            ...o, 
            dist: getDistance(lat, lng, o.lat, o.lng), 
            isMatched: checkMatch(o),
            priority: getPriority(o.type)
        }))
        .sort((a, b) => (b.isMatched - a.isMatched) || (b.priority - a.priority) || (a.dist - b.dist))
        .slice(0, 2);

    let adminResults = offices.filter(o => ["세무서", "토지정보과"].includes(o.type))
        .map(o => ({ ...o, isMatched: checkMatch(o) }))
        .sort((a, b) => (b.isMatched - a.isMatched));

    let oneLand = adminResults.filter(o => o.type === "토지정보과" && o.isMatched).slice(0, 1);
    let oneTax = adminResults.filter(o => o.type === "세무서" && o.isMatched).slice(0, 1);

    displayResults(recTargets, [...oneLand, ...oneTax]);
}

function displayResults(recData, adminData) {
    const recEl = document.getElementById("rec-section");
    const adminEl = document.getElementById("admin-section");
    
    recEl.innerHTML = `<span class="section-title">관할기관 안내</span>`;
    recData.forEach(o => recEl.innerHTML += createCard(o, true));

    adminEl.innerHTML = `<span class="section-title">중개사, 세금관련 문의</span>`;
    adminData.forEach(o => adminEl.innerHTML += createCard(o, false));
}

function createCard(o, isRec) {
    const distText = (isRec && o.dist !== null) ? `<span style="color:#16a34a; font-size:11px; font-weight:bold;">${o.dist.toFixed(1)}km</span>` : '';
    
    return `
        <div class="office-card ${isRec ? 'recommend' : ''}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="office-name">${o.name}</span>
                ${distText}
            </div>
            <span class="phone-text">📞 ${o.phone}</span>
            <p class="addr-text">🏠 ${o.address}</p>
        </div>`;
}

function updateFocus(items) {
    if (!items) return;
    for (let i = 0; i < items.length; i++) items[i].classList.remove("active");
    if (focusedIndex >= 0 && items[focusedIndex]) {
        items[focusedIndex].classList.add("active");
        items[focusedIndex].scrollIntoView({ block: "nearest" });
    }
}

document.addEventListener("DOMContentLoaded", function(){
    const input = document.getElementById("keyword");
    input.addEventListener("input", () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => searchAddress(false), 200); });
    input.addEventListener("keydown", function(e){
        const listEl = document.getElementById("addressList");
        const items = listEl.getElementsByClassName("search-item");
        if (listEl.style.display === "block" && items.length > 0) {
            if (e.key === "ArrowDown") { e.preventDefault(); focusedIndex = (focusedIndex + 1) % items.length; updateFocus(items); }
            else if (e.key === "ArrowUp") { e.preventDefault(); focusedIndex = (focusedIndex - 1 + items.length) % items.length; updateFocus(items); }
            else if (e.key === "Enter") { e.preventDefault(); const targetIdx = (focusedIndex > -1) ? focusedIndex : 0; if (currentAddressResults[targetIdx]) selectItem(currentAddressResults[targetIdx]); }
        }
    });
});
</script>
