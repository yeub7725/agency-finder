// [유틸리티] 거리 계산
function getDistance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// [핵심] 주소 검색
function searchAddress(isFinal = false) {
    const keyword = document.getElementById("keyword").value.trim();
    const listEl = document.getElementById("addressList");
    if(keyword.length < 2) { listEl.style.display = "none"; return; }

    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, function(result, status){
        if(status === kakao.maps.services.Status.OK){
            if(result.length === 1 && isFinal) {
                listEl.style.display = "none";
                selectItem(result[0]);
            } else {
                listEl.innerHTML = "";
                listEl.style.display = "block";
                result.forEach((item) => {
                    const div = document.createElement("div");
                    div.className = "search-item";
                    div.innerHTML = item.address_name;
                    div.onclick = () => selectItem(item);
                    listEl.appendChild(div);
                });
            }
        }
    });
}

function selectItem(item) {
    document.getElementById("addressList").style.display = "none";
    document.getElementById("keyword").value = item.address_name;
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
}

function findNearest(lat, lng, fullAddress){
    const addrParts = fullAddress.split(' ');
    const regionKeyword = addrParts[0].substring(0, 2); 
    const district = addrParts[1]; 
    
    let targets = offices.filter(o => o.covers.includes(regionKeyword));

    const sortedResult = targets.map(o => ({
        ...o,
        dist: getDistance(lat, lng, o.lat, o.lng)
    })).sort((a,b) => a.dist - b.dist);

    displayResults(sortedResult.slice(0, 2), regionKeyword, district);
}

// [출력] 결과 화면 생성
function displayResults(data, region, district) {
    let html = `<span class="jurisdiction-info">📍 관할지역: ${region} ${district || ''}</span>`;
    
    // 1. 공단/부동산원 카드 생성
    data.forEach(o => {
        let typeName = o.type === "REB" ? "부동산원" : (o.type === "LAKAS" ? "법률구조공단" : (o.type === "LH" ? "LH공사" : "지자체"));
        html += `
            <div class="office-card">
                <span class="type-badge">${typeName}</span>
                <h3>${o.name}</h3>
                <p class="addr-text">${o.address}</p>
                <span class="phone-text">${o.phone}</span>
                <p style="font-size:13px; color:#999;">직선거리 약 ${o.dist.toFixed(1)} km</p>
            </div>`;
    });

    // 2. 추가 안내 (구청/세무서) - localOfficesData에서 찾기
    if(district) {
        // covers 배열 안에 district(예: '종로구')가 포함된 데이터를 찾습니다.
        const landInfo = localOfficesData.find(o => o.type === "LAND" && o.covers.includes(district));
        const taxInfo = localOfficesData.find(o => o.type === "TAX" && o.covers.includes(district));

        const officeName = landInfo ? landInfo.name : `${district}청 토지정보과`;
        const taxName = taxInfo ? taxInfo.name : `${district} 관할 세무서`;
        const landPhone = landInfo ? landInfo.phone : "구청 대표번호 문의";
        const taxPhone = taxInfo ? taxInfo.phone : "126 (국세청)";

        html += `
            <div class="recommend-section">
                <span class="recommend-title">💡 해당 지역 추가 안내</span>
                <div class="recommend-card">
                    <span>${officeName}</span>
                    <small>임대차 계약 신고 및 공시지가 관련 문의</small>
                    <div style="margin-top:5px; font-weight:bold; color:#0056b3;">${landPhone}</div>
                </div>
                <div class="recommend-card">
                    <span>${taxName}</span>
                    <small>주택 임대소득세 및 세무 관련 문의</small>
                    <div style="margin-top:5px; font-weight:bold; color:#0056b3;">${taxPhone}</div>
                </div>
            </div>`;
    }

    document.getElementById("result").innerHTML = html;
}

// 3. 이벤트 리스너 설정
document.addEventListener("DOMContentLoaded", function(){
    const input = document.getElementById("keyword");
    input.addEventListener("input", () => {
        focusedIndex = -1;
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => searchAddress(false), 200);
    });

    input.addEventListener("keydown", function(e){
        const listEl = document.getElementById("addressList");
        const items = listEl.getElementsByClassName("search-item");
        if (e.key === "Enter") {
            e.preventDefault();
            if (focusedIndex > -1 && items.length > 0) items[focusedIndex].click();
            else searchAddress(true);
        } else if (listEl.style.display === "block") {
            if (e.key === "ArrowDown") {
                focusedIndex = (focusedIndex + 1) % items.length;
                updateFocus(items);
            } else if (e.key === "ArrowUp") {
                focusedIndex = (focusedIndex - 1 + items.length) % items.length;
                updateFocus(items);
            }
        }
    });

    function updateFocus(items) {
        for (let item of items) item.classList.remove("active");
        if (focusedIndex > -1) items[focusedIndex].classList.add("active");
    }
});
</script>
