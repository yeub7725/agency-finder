<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="utf-8">
    <title>관할기관 통합 검색 및 계산기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: rgb(0, 55, 100);
            --gov-red: rgb(228, 3, 45);
            --gov-gray: rgb(30, 41, 59);
            --gov-light-gray: rgb(100, 116, 139);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background: #fff; }
        .main-wrapper { display: flex; height: 100vh; width: 100vw; background: #f8fafc; }
        
        /* 왼쪽 사이드바 영역 (기존 유지) */
        #sidebar-search { 
            width: 40vw; min-width: 500px; max-width: 650px; 
            border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; background: #fff; height: 100%; position: relative;
        }
        
        .search-header { padding: 15px 20px 20px 20px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; position: relative; z-index: 1000; }
        h1 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--gov-blue); font-weight: 900; }
        .search-row { display: flex; align-items: center; width: 100%; border: 2px solid var(--gov-blue); border-radius: 4px; background: #fff; height: 40px; position: relative; box-sizing: border-box; }
        .search-container { flex: 1.8; }
        input#keyword { width: 100%; padding: 0 12px; font-size: 14px; border: none; outline: none; background: transparent; }
        
        #addressList { position: absolute; top: calc(100%); left: -2px; width: calc(100% + 4px); border: 2px solid var(--gov-blue); background: white; z-index: 9999; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-item { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; text-align: left; }
        .search-item:hover { background-color: #f0f7ff; color: var(--gov-blue); font-weight: 700; }

        .date-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #fff; height: 100%; }
        .date-group { display: flex; align-items: center; gap: 1px; }
        .date-group input { width: 22px; border: none !important; text-align: center; font-size: 13px; font-weight: bold; color: var(--gov-blue); outline: none; }

        .price-container { flex: 2; display: flex; align-items: center; justify-content: flex-end; padding: 0 10px; background: #fff; height: 100%; }
        .price-input-wrap { display: flex; align-items: center; gap: 2px; }
        .price-input-wrap input { width: 55px; border: none; outline: none; font-size: 12px; font-weight: 700; text-align: right; }
        .price-unit { font-size: 12px; color: var(--gov-gray); font-weight: 700; }

        /* 타임라인 영역 (기존 유지) */
        #timeline-container { position: relative; padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .contract-settings { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; font-size: 13px; font-weight: 700; }
        #date-visual-line { width: 100%; height: 30px; display: flex; align-items: center; position: relative; }

        /* 결과창 영역 */
        #result-area { flex: 1; overflow-y: auto; padding: 5px 15px; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--gov-gray); margin: 15px 0 5px 0; display: flex; align-items: center; gap: 5px; }
        .section-title::before { content: ''; width: 3px; height: 12px; background: var(--gov-blue); }
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 6px; margin-bottom: 10px; }
        .contact-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dotted #e2e8f0; font-size: 13px; align-items: center; }

        /* 💰 [수정] 계산기 플로팅 박스 디자인 */
        #calculator-container {
            visibility: hidden; position: fixed; top: 20px; right: 20px; width: 330px;
            background: #fff; border: 2px solid var(--gov-blue); border-radius: 6px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999;
        }
        /* 제목과 기준금리 한 줄 배치 */
        .calc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .calc-title { font-size: 14.5px; font-weight: 900; color: var(--gov-blue); }
        .calc-base-rate { display: flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 800; color: var(--gov-gray); }
        .calc-base-rate input { width: 42px; text-align: center; border: 1px solid #cbd5e1; border-radius: 3px; font-weight: 900; color: var(--gov-red); outline: none; }

        .calc-box { margin-bottom: 15px; }
        .calc-subtitle { font-size: 13px; font-weight: 800; color: var(--gov-gray); margin-bottom: 6px; }
        .calc-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; align-items: center; font-weight: 700; }
        
        /* 결과창 양끝 정렬 및 공식 출력 */
        .calc-result-box { background:#f8fafc; padding:10px; border-radius:4px; border: 1px solid #e2e8f0; margin-top:8px; }
        .formula-text { font-size: 10.5px; color: #94a3b8; text-align: right; margin-top: 5px; font-weight: normal; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="sidebar-search">
        <div class="search-header">
            <h1>관할기관 통합 검색</h1>
            <div class="search-row">
                <div class="search-container"><input id="keyword" placeholder="주소 입력" autocomplete="off"></div>
                <div class="date-container">
                    <div class="date-group">
                        <input type="text" id="yy" maxlength="2" placeholder="YY">.
                        <input type="text" id="mm" maxlength="2" placeholder="MM">.
                        <input type="text" id="dd" maxlength="2" placeholder="DD">
                    </div>
                </div>
                <div class="price-container">
                    <div class="price-input-wrap"><input type="text" id="deposit" placeholder="보증금"><span class="price-unit">만원</span></div>
                    <span style="color:#e2e8f0; margin:0 5px;">/</span>
                    <div class="price-input-wrap"><input type="text" id="rent" placeholder="월세"><span class="price-unit">만원</span></div>
                </div>
                <div id="addressList"></div>
            </div>
        </div>

        <div id="timeline-container">
            <div class="contract-settings">
                <label><input type="radio" name="bldgType" value="house" checked> 주택</label>
                <label><input type="radio" name="bldgType" value="com"> 상가</label>
                <div style="background:#f1f5f9; padding:2px 8px; border-radius:4px; font-size: 12px;">
                    최초계약 <input type="number" id="initYears" value="2" style="width:25px; border:none; background:transparent; font-weight:900; color:var(--gov-blue);"> 년
                </div>
            </div>
            <div id="date-visual-line"></div>
            <div id="notice-detail-info"></div>
        </div>

        <div id="result-area">
            <div id="office-list"></div>
            <div class="section-title">주요 업무 문의처</div>
            <div class="info-box">
                <div class="contact-item"><span>한국부동산원(분쟁조정)</span><b>1600-2828</b></div>
                <div class="contact-item"><span>렌트홈(임대등록)</span><b>1670-8004</b></div>
                <div class="contact-item"><span>대한법률구조공단</span><b>132</b></div>
            </div>
        </div>
    </div>

    <div id="calculator-container">
        <div class="calc-header">
            <div class="calc-title">보증금/월차임 상한 & 전환</div>
            <div class="calc-base-rate">
                <span>기준금리:</span>
                <input type="number" id="baseRateInput" value="3.5" step="0.1"><span>%</span>
            </div>
        </div>

        <div class="calc-box">
            <div class="calc-subtitle">1. 5% 최대 증액 범위</div>
            <div class="calc-row"><span>보증금 상한:</span> <b id="calc-max-deposit">-</b></div>
            <div class="calc-row"><span>월차임 상한:</span> <b id="calc-max-rent">-</b></div>
        </div>

        <div class="calc-box" style="margin-bottom: 0;">
            <div class="calc-subtitle">2. 전월세 전환 (환산 월차임)</div>
            <div class="calc-row"><span>적용 전환율:</span> <b id="calc-conv-rate" style="color:var(--gov-red);">-</b></div>
            
            <div class="calc-result-box">
                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                    <span style="font-size: 12px; font-weight: 700;">💡 보증금 <b style="color:var(--gov-light-gray);">1,000만 원</b> 전환 시</span>
                    <span style="font-size: 13px; font-weight: 900;">➔ 월 <b id="calc-conv-example" style="color:var(--gov-blue); font-size:15px;">-</b></span>
                </div>
                <div id="calc-conv-detail-formula" class="formula-text"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 필수 요소 정의
    const depositInput = document.getElementById("deposit");
    const rentInput = document.getElementById("rent");
    const baseRateInput = document.getElementById("baseRateInput");
    const calcContainer = document.getElementById("calculator-container");

    // 2. 💰 계산기 핵심 로직
    function updateCalculator() {
        // 숫자 콤마 제거 후 변환
        const depVal = parseInt(depositInput.value.replace(/,/g, '')) || 0;
        const rentVal = parseInt(rentInput.value.replace(/,/g, '')) || 0;
        const baseRate = parseFloat(baseRateInput.value) || 0;
        const isCom = document.querySelector('input[name="bldgType"]:checked').value === 'com';

        // 입력값이 있을 때만 계산기 표시
        if (depVal > 0 || rentVal > 0) {
            calcContainer.style.visibility = "visible";
            document.getElementById("calc-max-deposit").innerText = Math.floor(depVal * 0.05).toLocaleString() + " 만원";
            document.getElementById("calc-max-rent").innerText = Math.floor(rentVal * 0.05).toLocaleString() + " 만원";
        } else {
            calcContainer.style.visibility = "hidden";
            return;
        }

        // 전환율 및 공식 설정
        let convRate, formulaText;
        if (!isCom) {
            convRate = Math.min(10, baseRate + 2);
            formulaText = "전환할 금액 X (기준금리 + 2%) / 12";
        } else {
            convRate = Math.min(12, baseRate * 4.5);
            formulaText = "전환할 금액 X (기준금리 × 4.5배) / 12";
        }

        document.getElementById("calc-conv-rate").innerText = `연 ${convRate.toFixed(2)}%`;
        document.getElementById("calc-conv-detail-formula").innerText = formulaText;
        
        // 예시 계산
        let monthlyAdd = (10000000 * (convRate / 100)) / 12;
        document.getElementById("calc-conv-example").innerText = Math.floor(monthlyAdd).toLocaleString() + "원";
    }

    // 3. 입력 이벤트 연결 (콤마 처리 포함)
    [depositInput, rentInput].forEach(el => {
        el.addEventListener("input", (e) => {
            let val = e.target.value.replace(/[^0-9]/g, "");
            e.target.value = val ? Number(val).toLocaleString() : "";
            updateCalculator();
        });
    });
    baseRateInput.addEventListener("input", updateCalculator);
    document.querySelectorAll('input[name="bldgType"]').forEach(r => r.addEventListener('change', updateCalculator));

    // (기존 파일의 주소 검색 및 타임라인 데이터/함수들은 이 아래에 그대로 유지하시면 됩니다.)
</script>
</body>
</html>
