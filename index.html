<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>관할기관 찾기</title>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d791798c38589fc7cdc6bce91d9369be&libraries=services"></script>
<style>
    /* 폰트 및 기본 스타일 설정 */
    body { 
        font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
        line-height: 1.6; 
        max-width: 800px; 
        margin: 50px auto; 
        padding: 0 20px;
        font-size: 18px; /* 기본 폰트 사이즈 (기존 주소지 입력 수준) */
    }

    /* 제목 스타일: 기본 폰트보다 크게 설정 */
    h1 { 
        font-size: 2.5rem; 
        text-align: center; 
        margin-bottom: 30px; 
        color: #333;
    }

    /* 검색 영역 중앙 배치 */
    .search-container {
        text-align: center;
        margin-bottom: 40px;
    }

    input#keyword { 
        padding: 12px 15px; 
        width: 60%; 
        font-size: 18px; 
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button#searchBtn { 
        padding: 12px 25px; 
        font-size: 18px; 
        cursor: pointer; 
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        margin-left: 5px;
    }

    /* 주소 목록 스타일 */
    #addressList { 
        border: 1px solid #ddd; 
        margin: 10px auto; 
        width: 80%;
        max-height: 250px; 
        overflow-y: auto; 
        display: none; 
        background: white;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .search-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; text-align: left; }
    .search-item:hover { background-color: #f0f7ff; }

    /* 결과 출력 영역 */
    #result { margin-top: 30px; }
    .office-card { 
        border: 1px solid #e1e1e1; 
        padding: 20px; 
        margin-bottom: 20px; 
        border-radius: 8px;
        background-color: #fcfcfc;
    }
    .office-card h3 { margin-top: 0; color: #0056b3; font-size: 1.4rem; }
    .jurisdiction-tag { font-weight: bold; color: #d9534f; margin-bottom: 15px; display: block; }
</style>
</head>
<body>

<h1>주소지 입력</h1>

<div class="search-container">
    <input id="keyword" placeholder="">
    <button id="searchBtn">검색</button>
    <div id="addressList"></div>
</div>

<div id="result"></div>

<script>
// --- 기관 데이터 (기존 데이터 유지) ---
const offices = [
  {name:"한국부동산원 서울동부지사", region:"서울", lat:37.5576984952347, lng:127.079226104632, phone:"02-3394-9870~3", address:"서울시 광진구 천호대로 549, 지타워 10층"},
  {name:"한국부동산원 고양지사", region:"경기", lat:37.6526192547913, lng:126.776883538123, phone:"031-902-3573~5", address:"경기도 고양시 일산동구 중앙로 1187, 흥국생명빌딩 8층"},
  {name:"한국부동산원 성남지사", region:"경기", lat:37.4111581198118, lng:127.128242905298, phone:"031-8017-8488~90", address:"경기도 성남시 분당구 야탑로 81번길 16"},
  {name:"한국부동산원 인천지사", region:"인천", lat:37.4010359457774, lng:126.712020985301, phone:"032-429-7041~6", address:"인천시 남동구 논현로 46번길 23, 7층"},
  {name:"한국부동산원 춘천지사", region:"강원", lat:37.8834255926876, lng:127.7299086954, phone:"033-244-9793~4", address:"강원도 춘천시 중앙로 16, 무림빌딩 7층"},
  {name:"대한법률구조공단 수원지부", region:"경기", lat:37.2775333113317, lng:127.049515760488, phone:"031-8007-3430", address:"경기도 수원시 영통구 월드컵로 150번길 10, YM빌딩 3층"},
  {name:"경기도 지자체", region:"경기", lat:37.2746661643172, lng:127.009619860326, phone:"031-8008-2868", address:"경기도 수원시 팔달구 효원로 1"}
  // ... 추가 데이터 필요시 여기에 동일한 형식으로 입력
];

function distance(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function searchAddress(){
  const keyword = document.getElementById("keyword").value.trim();
  if(!keyword){ alert("검색어를 입력하세요."); return; }

  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(keyword, function(result, status){
    const listEl = document.getElementById("addressList");
    listEl.innerHTML = "";
    
    if(status === kakao.maps.services.Status.OK){
      listEl.style.display = "block";
      result.forEach(item => {
        const div = document.createElement("div");
        div.className = "search-item";
        div.innerHTML = `<strong>${item.address_name}</strong>`;
        div.onclick = function(){
          listEl.style.display = "none";
          document.getElementById("keyword").value = item.address_name;
          findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
        };
        listEl.appendChild(div);
      });
    } else {
      listEl.style.display = "none";
      document.getElementById("result").innerHTML = "검색 결과가 없습니다.";
    }
  });
}

function findNearest(lat, lng, fullAddress){
  const regionName = fullAddress.split(' ')[0].substring(0, 2);
  const filteredOffices = offices.filter(o => o.region === regionName);
  const targetList = filteredOffices.length > 0 ? filteredOffices : offices;

  const finalResult = targetList.map(o => ({
    ...o,
    dist: distance(lat, lng, o.lat, o.lng)
  })).sort((a,b) => a.dist - b.dist);

  let html = `<span class="jurisdiction-tag">관할지역: ${regionName}</span>`;

  finalResult.slice(0, 2).forEach(o => {
    html += `
      <div class="office-card">
        <h3>${o.name}</h3>
        주소: ${o.address}<br>
        전화: ${o.phone}<br>
        거리: ${o.dist.toFixed(1)} km
      </div>`;
  });

  document.getElementById("result").innerHTML = html;
}

document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("searchBtn").addEventListener("click", searchAddress);
  document.getElementById("keyword").addEventListener("keypress", e => { if(e.key === 'Enter') searchAddress(); });
});
</script>

</body>
</html>
