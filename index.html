    {name:"통영세무서", type:"TAX", covers:["통영시", "거제시", "고성군"], phone:"055-640-7200", address:"경남 통영시 무전5길 20-9"},
    {name:"해운대세무서", type:"TAX", covers:["부산 해운대구"], phone:"051-660-9200", address:"부산광역시 해운대구 좌동순환로 17"}
];
let geocoder;
window.onload = function() {
    geocoder = new kakao.maps.services.Geocoder();
    const input = document.getElementById("keyword");
    input.addEventListener("input", function() {
        if(this.value.length < 2) return;
        geocoder.addressSearch(this.value, function(result, status) {
            if(status === kakao.maps.services.Status.OK) {
                const listEl = document.getElementById("addressList");
                listEl.innerHTML = ""; listEl.style.display = "block";
                result.forEach(addr => {
                    const div = document.createElement("div");
                    div.className = "search-item"; div.innerText = addr.address_name;
                    div.onclick = () => selectLocation(addr);
                    listEl.appendChild(div);
                });
            }
        });
    });
};

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))).toFixed(1);
}

function selectLocation(addr) {
    document.getElementById("addressList").style.display = "none";
    document.getElementById("keyword").value = addr.address_name;
    const userDistrict = addr.address_name.split(" ").find(p => p.endsWith('구') || p.endsWith('군'));
    const uLat = parseFloat(addr.y), uLng = parseFloat(addr.x);

    // 1. 추천 섹션 로직: [부동산원, 대법공, 주택공사, 지자체] 중 (관할매칭 > 거리순) 상위 2개
    const recList = officeData.filter(o => ["부동산원", "대법공", "주택공사", "지자체"].includes(o.type))
        .map(o => ({ ...o, dist: getDistance(uLat, uLng, o.lat, o.lng), isMatched: userDistrict && o.covers.some(c => userDistrict.includes(c)) }))
        .sort((a, b) => (b.isMatched - a.isMatched) || (a.dist - b.dist))
        .slice(0, 2);

    // 2. 행정 섹션 로직: [세무서, 토지정보과] 중 관할 매칭 우선
    const adminList = officeData.filter(o => ["세무서", "토지정보과"].includes(o.type))
        .map(o => ({ ...o, dist: getDistance(uLat, uLng, o.lat, o.lng), isMatched: userDistrict && o.covers.some(c => userDistrict.includes(c)) }))
        .sort((a, b) => (b.isMatched - a.isMatched) || (a.dist - b.dist));

    renderUI(recList, adminList);
}

function renderUI(rec, admin) {
    let recHtml = `<span class="section-title">관할 추천 기관</span>`;
    rec.forEach(o => { recHtml += createCard(o); });
    document.getElementById("recommend-section").innerHTML = recHtml;

    let adminHtml = `<span class="section-title">관할 행정 기관</span>`;
    admin.forEach(o => { adminHtml += createCard(o); });
    document.getElementById("admin-section").innerHTML = adminHtml;
}

function createCard(o) {
    return `
        <div class="office-card ${o.isMatched ? 'matched' : ''}">
            <div class="title-group">
                <span class="office-name">${o.name}</span>
                <span class="distance-text">(${o.dist}km)</span>
            </div>
            <span class="phone-text">📞 ${o.phone}</span>
            <p class="addr-text">🏠 ${o.address}</p>
        </div>`;
}
</script>
