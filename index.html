<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: rgb(0, 55, 100);
            --gov-red: rgb(228, 3, 45);
            --gov-gray: rgb(30, 41, 59);
            --gov-light-gray: rgb(100, 116, 139);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background: #fff; }
        .main-wrapper { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar-search { 
            width: 440px; min-width: 440px; border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; background: #fff; height: 100%; position: relative;
        }
        
        .search-header { padding: 15px 20px; flex-shrink: 0; z-index: 1000; border-bottom: 1px solid #f1f5f9; }
        h1 { font-size: 1.1rem; margin: 0 0 10px 0; color: var(--gov-blue); font-weight: 900; }
        
        /* 가로 한 줄 고정 검색바 */
        .search-row { 
            display: flex; flex-direction: row; flex-wrap: nowrap; align-items: center; 
            width: 100%; border: 2.5px solid var(--gov-blue); border-radius: 6px; 
            background: #fff; height: 46px; box-sizing: border-box;
        }
        
        .search-container { flex: 1; min-width: 0; position: relative; height: 100%; }
        input#keyword { width: 100%; height: 100%; padding: 0 12px; font-size: 14px; border: none; outline: none; background: transparent; }
        
        .date-container { 
            width: 85px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; 
            border-left: 1px solid #f0f0f0; height: 100%; 
        }
        .date-group { display: flex; align-items: center; white-space: nowrap; }
        .date-group input { width: 20px; border: none !important; text-align: center; font-size: 14px; font-weight: bold; color: var(--gov-blue); outline: none; background: transparent; }
        .date-group span { color: #cbd5e1; font-weight: bold; }

        .price-container { 
            width: 135px; flex-shrink: 0; display: flex; align-items: center; 
            border-left: 1px solid #f0f0f0; height: 100%; padding: 0 5px;
        }
        .price-input-wrap { display: flex; align-items: center; flex: 1; }
        .price-input-wrap input { width: 100%; border: none; outline: none; font-size: 12px; font-weight: 700; color: var(--gov-gray); text-align: right; background: transparent; }
        .price-unit { font-size: 11px; color: var(--gov-gray); margin-left: 2px; white-space: nowrap; }
        .price-slash { color: #e2e8f0; margin: 0 2px; }

        /* 주소 미리보기 목록 */
        #addressList { 
            position: absolute; top: 48px; left: -2.5px; width: calc(100% + 5px); 
            border: 2px solid var(--gov-blue); background: white; z-index: 9999; 
            display: none; border-radius: 0 0 6px 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
        .search-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; text-align: left; }
        .search-item:hover, .search-item.active { background-color: #f8fbff; color: var(--gov-blue); font-weight: bold; }

        /* 결과 영역 */
        #result-area { flex: 1; overflow-y: auto; padding: 15px; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--gov-gray); margin: 15px 0 8px 0; display: flex; align-items: center; gap: 5px; }
        .section-title::before { content: ''; width: 3px; height: 12px; background: var(--gov-blue); }
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 6px; }
        .contact-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px dotted #e2e8f0; }
        .contact-item:last-child { border-bottom: none; }
        .office-card { border: 2px solid var(--gov-blue); background: #f8fbff; padding: 12px; border-radius: 6px; margin-bottom: 10px; }
        .office-name { font-size: 16px; font-weight: 900; color: var(--gov-blue); }
        .phone-text { font-size: 24px; font-weight: 900; color: var(--gov-red); display: block; margin: 5px 0; }
        
        /* 날짜 시각화 */
        #date-visual-line { visibility: hidden; margin-top: 15px; position: relative; height: 40px; border-top: 1px solid #e2e8f0; padding-top: 10px; }
        .date-label { font-size: 11px; font-weight: 700; color: var(--gov-gray); position: absolute; }
        .date-label.start { left: 0; }
        .date-label.end { right: 0; }
    </style>
</head>

    {name:"대한법률구조공단 부산지부", type:"대법공", covers:["부산", "울산", "경남"], lat:35.190787, lng:129.074010, phone:"051-711-3430", address:"부산시 연제구 법원남로 15번길 4, 성신프라이어빌딩 5층"},
    {name:"대한법률구조공단 광주지부", type:"대법공", covers:["광주", "전남", "전북", "제주"], lat:35.149140, lng:126.848917, phone:"062-710-3430", address:"광주시 서구 상무중앙로 28번길 4, 세진빌딩 4층 401호"},
    {name:"서울시청 (지자체)", type:"지자체", covers:["서울", "강서구", "은평구", "종로구", "서대문구", "마포구", "영등포구", "양천구", "구로구"], lat:37.564554, lng:126.975613, phone:"02-2133-1200~8", address:"서울시 중구 덕수궁길 15, 서울시청 서소문별관"},
    {name:"경기도청 (지자체)", type:"지자체", covers:["경기"], lat:37.274666, lng:127.009619, phone:"031-8008-2868", address:"경기도 수원시 팔달구 효원로 1"}
];
const keywordInput = document.getElementById("keyword");
const addressList = document.getElementById("addressList");
const dateInputs = [document.getElementById("yy"), document.getElementById("mm"), document.getElementById("dd")];
const depositInput = document.getElementById("deposit");
const rentInput = document.getElementById("rent");
const visualLine = document.getElementById("date-visual-line");
const beforeDateVal = document.getElementById("before-date-val");
const afterDateVal = document.getElementById("after-date-val");

// 전역 상태 관리 변수
let currentAddressResults = [];
let focusedIndex = -1;
let debounceTimer;
let lastSearchKeyword = "";
let isNavigating = false; 

// 1. 날짜 계산 및 시각화 업데이트 로직
function calculateTwoYears() {
    let y = dateInputs[0].value, m = dateInputs[1].value, d = dateInputs[2].value;
    
    // YY, MM, DD가 모두 2자리씩 입력되었을 때만 계산
    if (y.length === 2 && m.length === 2 && d.length === 2) {
        let numM = Math.min(Math.max(parseInt(m), 1), 12);
        let numD = Math.min(Math.max(parseInt(d), 1), 31);
        
        // 50보다 크면 1900년대, 작으면 2000년대로 처리
        let fullYear = parseInt(y) > 50 ? 1900 + parseInt(y) : 2000 + parseInt(y);
        let dateObj = new Date(fullYear, numM - 1, numD);
        
        // 시작 날짜 레이블 업데이트
        beforeDateVal.innerText = `${y}.${String(numM).padStart(2, '0')}.${String(numD).padStart(2, '0')}`;
        
        // 2년 뒤 만기 날짜 계산
        let endDate = new Date(dateObj);
        endDate.setFullYear(endDate.getFullYear() + 2);
        
        // 만기 날짜 레이블 업데이트
        afterDateVal.innerText = `${String(endDate.getFullYear()).slice(-2)}.${String(endDate.getMonth() + 1).padStart(2, '0')}.${String(endDate.getDate()).padStart(2, '0')}`;
        
        // 시각화 라인 표시
        visualLine.style.visibility = "visible";
    } else { 
        visualLine.style.visibility = "hidden"; 
    }
}

// 2. 날짜 입력 제어 및 자동 포커스 이동
dateInputs.forEach((input, idx) => {
    input.addEventListener("input", () => {
        // 숫자만 입력 가능하도록 제한
        input.value = input.value.replace(/[^0-9]/g, "");
        
        // 2글자가 채워지면 다음 칸으로 포커스 이동
        if (input.value.length === 2) {
            if (idx < 2) {
                dateInputs[idx + 1].focus();
            } else {
                depositInput.focus();
            }
        }
        calculateTwoYears();
    });
});

// 3. 주소 검색 함수 (Kakao Maps Geocoder 연동)
function searchAddress() {
    const keyword = keywordInput.value.trim();
    
    // 검색 조건 필터링
    if (isNavigating || !keyword || keyword === lastSearchKeyword) return;
    if (keyword.length < 2) { addressList.style.display = "none"; return; }
    
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, function(result, status) {
        if (status === kakao.maps.services.Status.OK) {
            currentAddressResults = result;
            addressList.innerHTML = "";
            addressList.style.display = "block";
            focusedIndex = -1; 
            
            result.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerText = item.address_name;
                // 클릭 시 아이템 선택
                div.onmousedown = (e) => { 
                    e.preventDefault(); 
                    selectItem(item); 
                };
                addressList.appendChild(div);
            });
        } else {
            addressList.style.display = "none";
        }
    });
}

// 4. 주소 아이템 선택 시 실행되는 함수
function selectItem(item) {
    if (!item) return;
    addressList.style.display = "none";
    keywordInput.value = item.address_name;
    lastSearchKeyword = item.address_name;
    
    // UI 전환: 안내 텍스트 숨기고 정보 영역 표시
    document.getElementById("rec-section").style.display = "none";
    document.getElementById("sub-info-area").style.display = "flex";
    
    // 선택 후 날짜(YY) 칸으로 자동 포커스
    setTimeout(() => { dateInputs[0].focus(); }, 10);
    
    // 좌표 기준 관할기관 찾기 실행
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
}

// 5. 거리 계산 (Haversine 공식)
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + 
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// 6. 관할기관 필터링 및 정렬
function findNearest(lat, lng, fullAddress) {
    const addrParts = fullAddress.split(' ');
    const mySido = addrParts[0].substring(0, 2); 
    const myGu = addrParts.find(p => p.endsWith('구')) || "";
    
    let filtered = offices.map(o => {
        const dist = getDistance(lat, lng, o.lat, o.lng);
        const hasSido = o.covers.includes(mySido);
        const hasGu = myGu && o.covers.includes(myGu);
        let score = hasGu ? 100 : (hasSido ? 50 : 0);
        let displayCover = o.covers.includes("서울") ? "서울" : (o.covers[0] || "");
        return { ...o, dist, score, displayCover };
    });
    
    let finalResults = (mySido === "서울") ? 
        filtered.filter(o => o.score > 0).sort((a, b) => b.score - a.score || a.dist - b.dist).slice(0, 2) :
        filtered.filter(o => o.score > 0).sort((a, b) => b.score - a.score || a.dist - b.dist).slice(0, 1);
    
    displayResults(finalResults);
}

// 7. 결과 화면 표시 (카드 생성)
function displayResults(recData) {
    const officeList = document.getElementById("office-list");
    officeList.innerHTML = `<span class="section-title">관할기관 안내</span>`;
    
    recData.forEach((o) => {
        let displayName = o.name.includes("(지자체)") ? 
            o.name.replace("(지자체)", `<span class="office-name-sub">(지자체)</span>`) : o.name;
            
        officeList.innerHTML += `
            <div class="office-card recommend">
                <div class="card-top">
                    <span class="office-name">${displayName}</span>
                    <div class="meta-info">
                        <span class="zone-text">${o.displayCover}</span>
                        <span class="dist-text">(${o.dist.toFixed(1)}km)</span>
                    </div>
                </div>
                <div class="phone-row">
                    <span class="phone-text">${o.phone}</span>
                    <span class="sms-tag">${o.type === "지자체" ? "문자 X" : "문자 O"}</span>
                </div>
                <p class="addr-text">${o.address}</p>
            </div>`;
    });
}

// 8. 키보드 이벤트 (주소 목록 선택)
keywordInput.addEventListener("keydown", (e) => {
    const items = addressList.getElementsByClassName("search-item");
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        if (items.length === 0) return;
        e.preventDefault();
        isNavigating = true; 
        if (e.key === "ArrowDown") focusedIndex = (focusedIndex + 1) % items.length;
        else focusedIndex = (focusedIndex - 1 + items.length) % items.length;
        
        for (let i = 0; i < items.length; i++) {
            items[i].classList.toggle("active", i === focusedIndex);
        }
    }
    if (e.key === "Enter") {
        if (focusedIndex > -1) selectItem(currentAddressResults[focusedIndex]);
        else if (items.length > 0) selectItem(currentAddressResults[0]);
    }
});

// 9. 입력 감지 및 검색 실행 (Debounce)
keywordInput.addEventListener("input", () => {
    isNavigating = false; 
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(searchAddress, 200);
});

// 10. 금액 입력 포맷팅 (콤마 추가)
[depositInput, rentInput].forEach(input => {
    input.addEventListener("input", (e) => {
        let val = e.target.value.replace(/[^0-9]/g, "");
        e.target.value = val ? Number(val).toLocaleString() : "";
    });
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && input === depositInput) rentInput.focus();
    });
});

// 11. 외부 클릭 시 주소 목록 숨기기
document.addEventListener("click", (e) => {
    if (!e.target.closest('.search-container')) {
        addressList.style.display = "none";
    }
});
</script>
</body>
</html>
