<html lang="ko">

    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: rgb(0, 55, 100);
            --gov-red: rgb(228, 3, 45);
            --gov-gray: rgb(30, 41, 59);
            --gov-light-gray: rgb(100, 116, 139);
            --renew-bg: rgba(0, 55, 100, 0.08);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background: #fff; }
        .main-wrapper { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar-search { width: 440px; min-width: 440px; display: flex; flex-direction: column; background: #fff; height: 100%; position: relative; border-right: 1px solid #e2e8f0; }
        .search-header { padding: 15px 20px; flex-shrink: 0; z-index: 1000; }
        h1 { font-size: 1.1rem; margin: 0 0 10px 0; color: var(--gov-blue); font-weight: 900; }
        
        /* 통합 검색바 레이아웃 */
        .search-row { 
            display: flex; align-items: center; width: 100%; 
            border: 2.5px solid var(--gov-blue); border-radius: 6px; 
            background: #fff; height: 45px; box-sizing: border-box; overflow: hidden;
        }

        .search-container { flex: 1.5; height: 100%; position: relative; }
        input#keyword { width: 100%; height: 100%; padding: 0 15px; font-size: 14px; border: none; outline: none; }
        
        .date-container { width: 85px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; height: 100%; border-left: 1px solid #eee; }
        .date-group { display: flex; align-items: center; }
        .date-group input { width: 20px; border: none !important; text-align: center; font-size: 14px; font-weight: bold; color: var(--gov-blue); outline: none; background: transparent; padding: 0; }
        .date-group span { color: #cbd5e1; font-weight: bold; margin: 0 1px; }

        .price-container { width: 150px; flex-shrink: 0; display: flex; align-items: center; height: 100%; padding-right: 10px; border-left: 1px solid #eee; }
        .price-input-wrap { display: flex; align-items: center; flex: 1; }
        .price-input-wrap input { width: 100%; border: none; outline: none; font-size: 13px; font-weight: 700; color: var(--gov-gray); text-align: right; background: transparent; }
        .price-unit { font-size: 11px; color: var(--gov-gray); font-weight: 700; margin-left: 2px; }
        .price-slash { color: #e2e8f0; margin: 0 4px; }

        #addressList { position: absolute; top: 100%; left: 0; width: 100%; border: 2px solid var(--gov-blue); background: white; z-index: 9999; display: none; border-radius: 0 0 6px 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .search-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; text-align: left; }
        .search-item.active { background-color: #f0f4f8; }

        /* 시각화 그래픽 영역 */
        #date-visual-line { visibility: hidden; position: absolute; left: 440px; top: 43px; display: flex; align-items: center; width: 500px; }
        .line-bar { height: 2px; background: var(--gov-blue); flex: 1; position: relative; margin: 0 40px; }
        .line-bar::before, .line-bar::after { content: ''; position: absolute; top: -5px; width: 2px; height: 12px; background: var(--gov-blue); }
        .line-bar::before { left: 0; } .line-bar::after { right: 0; }
        .mid-point { position: absolute; left: 50%; top: -5px; width: 2px; height: 12px; background: #cbd5e1; transform: translateX(-50%); }

        .renew-zone { position: absolute; height: 20px; background: var(--renew-bg); border-left: 1px dashed var(--gov-blue); border-right: 1px dashed var(--gov-blue); top: -9px; display: flex; align-items: center; justify-content: center; }
        .renew-text { font-size: 11px; color: var(--gov-blue); font-weight: 900; white-space: nowrap; position: absolute; top: -22px; }

        .date-label { font-size: 12px; font-weight: 900; color: var(--gov-gray); position: absolute; top: 18px; white-space: nowrap; transform: translateX(-50%); text-align: center; }
        .date-label b { display: block; font-size: 10px; font-weight: 400; color: #64748b; margin-top: 2px; line-height: 1.2; }
        .date-label.start { left: 40px; } .date-label.end { left: calc(100% - 40px); }
        .date-label.renew-start { font-size: 11px; color: var(--gov-blue); top: 38px; }
        .date-label.renew-end { font-size: 11px; color: var(--gov-blue); top: 38px; }

        #result-area { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--gov-gray); margin: 15px 0 8px 0; display: flex; align-items: center; gap: 6px; }

        .contact-item b { color: var(--gov-red); font-weight: 900; font-size: 14px; }
    </style>
</head>

    {name:"서울시청 (지자체)", type:"지자체", covers:["서울", "강서구", "은평구", "종로구", "서대문구", "마포구", "영등포구", "양천구", "구로구"], lat:37.564554, lng:126.975613, phone:"02-2133-1200~8", address:"서울시 중구 덕수궁길 15, 서울시청 서소문별관"},
    {name:"경기도청 (지자체)", type:"지자체", covers:["경기"], lat:37.274666, lng:127.009619, phone:"031-8008-2868", address:"경기도 수원시 팔달구 효원로 1"}
];
let currentAddressResults = [];
let focusedIndex = -1;
let debounceTimer;
let lastSearchKeyword = "";
let isNavigating = false; 

const keywordInput = document.getElementById("keyword");
const addressList = document.getElementById("addressList");
const dateInputs = [document.getElementById("yy"), document.getElementById("mm"), document.getElementById("dd")];
const depositInput = document.getElementById("deposit");
const rentInput = document.getElementById("rent");

// 1. 주소 검색 (Kakao API 호출) - 미리보기 로직 강화
function searchAddress() {
    const keyword = keywordInput.value.trim();
    
    // 검색어가 없거나 너무 짧으면 목록 닫기
    if (keyword.length < 2) {
        addressList.style.display = "none";
        return;
    }

    // API 호출 (Geocoding)
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, function(result, status) {
        if (status === kakao.maps.services.Status.OK) {
            currentAddressResults = result;
            addressList.innerHTML = ""; // 기존 목록 초기화
            
            result.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerText = item.address_name;
                
                // 마우스 클릭 이벤트
                div.onmousedown = (e) => {
                    e.preventDefault(); // 포커스 뺏기 방지
                    selectItem(item);
                };
                
                addressList.appendChild(div);
            });
            
            addressList.style.display = "block"; // 목록 표시
            focusedIndex = -1;
        } else {
            addressList.style.display = "none";
        }
    });
}

// 2. 주소 선택 시 처리
function selectItem(item) {
    if (!item) return;
    
    addressList.style.display = "none";
    keywordInput.value = item.address_name;
    lastSearchKeyword = item.address_name;
    
    // 메인 화면 전환
    document.getElementById("rec-section").style.display = "none";
    document.getElementById("sub-info-area").style.display = "flex";
    
    // 거리 계산 및 결과 출력
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
    
    // 날짜 입력창으로 포커스 이동
    setTimeout(() => dateInputs[0].focus(), 10);
}

// 3. 키보드 네비게이션 (화살표/엔터)
keywordInput.addEventListener("keydown", (e) => {
    const items = addressList.getElementsByClassName("search-item");
    
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        if (items.length === 0) return;
        e.preventDefault();
        isNavigating = true;
        
        if (e.key === "ArrowDown") focusedIndex = (focusedIndex + 1) % items.length;
        else focusedIndex = (focusedIndex - 1 + items.length) % items.length;
        
        for (let i = 0; i < items.length; i++) {
            items[i].classList.toggle("active", i === focusedIndex);
        }
    }
    
    if (e.key === "Enter") {
        if (focusedIndex > -1 && currentAddressResults[focusedIndex]) {
            selectItem(currentAddressResults[focusedIndex]);
        } else if (items.length > 0) {
            selectItem(currentAddressResults[0]);
        }
    }
});

// 입력 발생 시 디바운스 적용
keywordInput.addEventListener("input", () => {
    isNavigating = false;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(searchAddress, 250);
});

// 4. 날짜/금액 관련 부가 기능
function calculateDates() {
    let y = dateInputs[0].value, m = dateInputs[1].value, d = dateInputs[2].value;
    if (y.length === 2 && m.length === 2 && d.length === 2) {
        let numY = parseInt(y), numM = parseInt(m), numD = parseInt(d);
        let fullYear = numY > 50 ? 1900 + numY : 2000 + numY;
        let start = new Date(fullYear, numM - 1, numD);
        let end = new Date(fullYear + 2, numM - 1, numD);
        
        let rStart = new Date(end); rStart.setMonth(rStart.getMonth() - 6);
        let rEnd = new Date(end); rEnd.setMonth(rEnd.getMonth() - 2);

        document.getElementById("before-date-val").innerHTML = `${y}.${m}.${d}<b>00:00부터</b>`;
        document.getElementById("after-date-val").innerHTML = `${String(end.getFullYear()).slice(-2)}.${m}.${d}<b>24:00까지</b>`;
        
        let rsPrev = new Date(rStart); rsPrev.setDate(rsPrev.getDate() - 1);
        let rsY = String(rStart.getFullYear()).slice(-2), rsM = String(rStart.getMonth()+1).padStart(2,'0'), rsD = String(rStart.getDate()).padStart(2,'0');
        let rspY = String(rsPrev.getFullYear()).slice(-2), rspM = String(rsPrev.getMonth()+1).padStart(2,'0'), rspD = String(rsPrev.getDate()).padStart(2,'0');
        let reY = String(rEnd.getFullYear()).slice(-2), reM = String(rEnd.getMonth()+1).padStart(2,'0'), reD = String(rEnd.getDate()).padStart(2,'0');

        document.getElementById("renew-start-val").innerHTML = `${rsY}.${rsM}.${rsD}<b>(${rspY}.${rspM}.${rspD} 24시부터)</b>`;
        document.getElementById("renew-end-val").innerHTML = `${reY}.${reM}.${reD}<b>(24:00까지)</b>`;

        document.getElementById("renew-block").style.left = "75%";
        document.getElementById("renew-start-val").style.left = "calc(40px + 420px * 0.75)";
        document.getElementById("renew-end-val").style.left = "calc(40px + 420px * 0.916)";
        document.getElementById("date-visual-line").style.visibility = "visible";
    }
}

dateInputs.forEach((input, idx) => {
    input.addEventListener("input", () => {
        if (input.value.length === 2) { 
            if (idx < 2) dateInputs[idx + 1].focus(); 
            else depositInput.focus(); 
        }
        calculateDates();
    });
});

[depositInput, rentInput].forEach(input => {
    input.addEventListener("input", (e) => {
        let val = e.target.value.replace(/[^0-9]/g, "");
        e.target.value = val ? Number(val).toLocaleString() : "";
    });
    input.addEventListener("keydown", (e) => { 
        if (e.key === "Enter" && input === depositInput) rentInput.focus(); 
    });
});

// 5. 기관 매칭 로직 (변화 없음)
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function findNearest(lat, lng, fullAddress) {
    const addrParts = fullAddress.split(' ');
    const mySido = addrParts[0].substring(0, 2);
    const myGu = addrParts.find(p => p.endsWith('구')) || "";
    let filtered = offices.map(o => {
        const dist = getDistance(lat, lng, o.lat, o.lng);
        const hasSido = o.covers.includes(mySido);
        const hasGu = myGu && o.covers.includes(myGu);
        let score = hasGu ? 100 : (hasSido ? 50 : 0);
        return { ...o, dist, score, displayCover: o.covers[0] };
    });
    let final = filtered.filter(o => o.score > 0).sort((a, b) => b.score - a.score || a.dist - b.dist).slice(0, (mySido === "서울" ? 2 : 1));
    displayResults(final);
}

function displayResults(data) {
    const list = document.getElementById("office-list");
    list.innerHTML = `<span class="section-title">관할기관 안내</span>`;
    data.forEach(o => {
        list.innerHTML += `<div class="office-card recommend">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="office-name">${o.name}</span>
                <span style="font-size:11px; color:var(--gov-light-gray); font-weight:700;">${o.displayCover} (${o.dist.toFixed(1)}km)</span>
            </div>
            <div class="phone-text">${o.phone}</div>
            <div style="font-size:12px; font-weight:800; color:var(--gov-red); opacity:0.6; margin-bottom:5px;">${o.type === "지자체" ? "문자 수신 불가" : "문자 수신 가능"}</div>
            <p style="font-size:12px; color:var(--gov-gray); margin:0; border-top:1px solid #eee; padding-top:8px;">${o.address}</p>
        </div>`;
    });
}

    if (!e.target.closest('.search-container')) addressList.style.display = "none";
});
