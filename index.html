                    <p>• <b>공통:</b> 신분증, 등기부등본, 건축물대장, 임대차계약서, 주민등록초본</p>
                    <p>• <b>대리:</b> 위임장, 인감증명서, 대리인 신분증</p>
                </div>

                <div class="section-title">주요 업무 문의처</div>
                <div class="info-box">
                    <div class="contact-item">
                        <span>한국부동산원 <span class="sub-desc">(공시/K-아파트)</span></span>
                        <b>1600-2828</b>
                    </div>
                    <div class="contact-item">전자계약<b>1833-4662</b></div>
                    <div class="contact-item">임대차신고<b>1533-2949</b></div>
                    <div class="contact-item">LH공사<b>1600-1004</b></div>
                    <div class="contact-item">렌트홈<b>1670-8004</b></div>
                    <div class="contact-item">대법공<b>132</b></div>
                    <div class="contact-item">국세청<b>126</b></div>
                </div>
                <div id="admin-section"></div>
            </div>
        </div>
    </div>
    <div id="content-area"></div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d791798c38589fc7cdc6bce91d9369be&libraries=services"></script>
<script>
/* offices 데이터는 사용자님의 기존 데이터를 여기에 넣어주세요 */
const offices = [
    // 예시: { name: "강서구청", type: "지자체", lat: 37.5509, lng: 126.8497, phone: "02-2600-6114", address: "서울 강서구 화곡로 302", covers: ["서울", "강서구"] }
];

let currentAddressResults = [];
let focusedIndex = -1;
let debounceTimer;
let lastSearchKeyword = "";
let isNavigating = false; 

const keywordInput = document.getElementById("keyword");
const addressList = document.getElementById("addressList");

// 주소 검색 (카카오 API)
function searchAddress() {
    const keyword = keywordInput.value.trim();
    if (isNavigating || !keyword || keyword === lastSearchKeyword) return;
    if (keyword.length < 2) { 
        addressList.style.display = "none"; 
        return; 
    }
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, function(result, status) {
        if (isNavigating) return;
        if (status === kakao.maps.services.Status.OK) {
            currentAddressResults = result;
            addressList.innerHTML = "";
            addressList.style.display = "block";
            focusedIndex = -1; 
            result.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerHTML = item.address_name;
                div.onmousedown = (e) => { e.preventDefault(); selectItem(item); };
                addressList.appendChild(div);
            });
        }
    });
}

// 주소 선택
function selectItem(item) {
    if (!item) return;
    isNavigating = false; 
    addressList.style.display = "none";
    keywordInput.value = item.address_name;
    lastSearchKeyword = item.address_name;
    document.getElementById("rec-section").style.display = "none";
    document.getElementById("sub-info-area").style.display = "flex";
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
}

// 관할 매칭 로직 (개선본)
function findNearest(lat, lng, fullAddress) {
    const addrParts = fullAddress.split(' ');
    const mySido = addrParts[0].substring(0, 2); 
    const myGu = addrParts.find(p => p.endsWith('구')) || "";
    const myCity = addrParts.find(p => p.endsWith('시')) || "";
    const myGun = addrParts.find(p => p.endsWith('군')) || "";

    const scoredOffices = offices.map(o => {
        const dist = getDistance(lat, lng, o.lat, o.lng);
        let isInJurisdiction = o.covers && o.covers.includes(mySido);
        let isPrimaryZone = isInJurisdiction && (
            (myGu && o.covers.includes(myGu)) || 
            (myCity && o.covers.includes(myCity)) || 
            (myGun && o.covers.includes(myGun))
        );

        let displayCover = "";
        if (o.type === "대법공") {
            const c = o.covers || [];
            if (c.includes("서울") || c.includes("강원")) displayCover = "서울·강원";
            else if (c.includes("경기") || c.includes("인천")) displayCover = "경기·인천";
            else if (c.some(v => ["대전","세종","충남","충북"].includes(v))) displayCover = "대전·세종·충남북";
            else if (c.some(v => ["대구","경북"].includes(v))) displayCover = "대구·경북";
            else if (c.some(v => ["부산","울산","경남"].includes(v))) displayCover = "부산·울산·경남";
            else if (c.some(v => ["광주","전남","전북","제주"].includes(v))) displayCover = "광주·전남북·제주";
            else displayCover = c[0] || "";
        } else {
            displayCover = o.covers && o.covers.includes("서울") ? "서울" : (o.covers ? o.covers[0] : "");
        }
        return { ...o, dist, isInJurisdiction, isPrimaryZone, displayCover };
    });

    const recTargets = scoredOffices
        .filter(o => ["부동산원", "대법공", "주택공사", "지자체"].includes(o.type) && o.isInJurisdiction)
        .sort((a, b) => {
            if (a.isPrimaryZone !== b.isPrimaryZone) return b.isPrimaryZone - a.isPrimaryZone;
            return a.dist - b.dist;
        })
        .slice(0, 2); 

    displayResults(recTargets);
}

// 결과 출력 (UI 로직)
function displayResults(recData) {
    const officeList = document.getElementById("office-list");
    const adminEl = document.getElementById("admin-section");
    
    officeList.innerHTML = `<span class="section-title">관할기관 안내</span>`;
    
    if (recData.length === 0) {
        officeList.innerHTML += `<p style="padding:40px; text-align:center; color:#94a3b8;">관할 정보를 찾을 수 없습니다.</p>`;
        return;
    }

    recData.forEach((o, index) => {
        // 2개일 때 두 번째 카드를 하단으로 밀기
        const pushClass = (recData.length === 2 && index === 1) ? 'push-bottom' : '';

        officeList.innerHTML += `
            <div class="office-card recommend ${pushClass}">
                <span class="office-name">${o.name}</span>
                <div class="meta-info">
                    <span class="zone-text">${o.displayCover} 관할</span>
                    <span class="dist-text">${o.dist.toFixed(1)}km</span>
                </div>
                <div style="border-top: 1px solid #f1f5f9; padding-top: 15px; margin-top: 10px;">
                    <a href="tel:${o.phone}" class="phone-text">📞 ${o.phone}</a>
                    <p class="addr-text">${o.address}</p>
                </div>
            </div>`;
    });

    if (adminEl) adminEl.style.display = "none";
}

// 거리 계산
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// 키보드 이벤트 (하이라이트 관리)
keywordInput.addEventListener("keydown", (e) => {
    const items = addressList.getElementsByClassName("search-item");
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        if (items.length === 0) return;
        e.preventDefault();
        isNavigating = true; 
        if (e.key === "ArrowDown") focusedIndex = (focusedIndex + 1) % items.length;
        else focusedIndex = (focusedIndex - 1 + items.length) % items.length;
        
        for (let i = 0; i < items.length; i++) {
            items[i].classList.toggle("active", i === focusedIndex);
            if (i === focusedIndex) items[i].scrollIntoView({ block: "nearest" });
        }
    }
    if (e.key === "Enter") {
        e.preventDefault();
        if (focusedIndex > -1) selectItem(currentAddressResults[focusedIndex]);
        else if (currentAddressResults.length > 0) selectItem(currentAddressResults[0]);
    }
});

keywordInput.addEventListener("input", () => {
    isNavigating = false; 
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(searchAddress, 200);
});

document.addEventListener("click", (e) => {
    if (e.target !== keywordInput) addressList.style.display = "none";
});
</script>
</body>
</html>
