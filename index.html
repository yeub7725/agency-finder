<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="utf-8">
    <title>관할기관 통합 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: rgb(0, 55, 100);
            --gov-red: rgb(228, 3, 45);
            --gov-gray: rgb(30, 41, 59);
            --gov-light-gray: rgb(100, 116, 139);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background: #fff; }
        .main-wrapper { display: flex; height: 100vh; width: 100vw; }
        
        /* 사이드바 너비: 580px (화면의 약 2/5) */
        #sidebar-search { 
            width: 580px; min-width: 580px; border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; background: #fff; height: 100%; position: relative;
        }
        
        .search-header { padding: 10px 20px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; position: relative; z-index: 1000; }
        h1 { font-size: 1.1rem; margin: 0 0 8px 0; color: var(--gov-blue); font-weight: 900; }
        
        .search-row { 
            display: flex; align-items: center; width: 100%; 
            border: 2px solid var(--gov-blue); border-radius: 4px; 
            background: #fff; box-sizing: border-box; height: 42px;
        }
    
        .search-container { flex: 2; position: relative; }
        input#keyword { width: 100%; padding: 0 12px; font-size: 14px; border: none; outline: none; background: transparent; }

        .date-container { flex: 1.2; display: flex; align-items: center; justify-content: center; background: #fff; height: 100%; border-left: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; }
        .date-group { display: flex; align-items: center; gap: 1px; }
        .date-group input { width: 25px; border: none !important; text-align: center; font-size: 14px; font-weight: bold; color: var(--gov-blue); outline: none; background: transparent; padding: 0; }
        .date-group span { color: #cbd5e1; font-weight: bold; font-size: 12px; }

        .price-container { 
            flex: 2.2; display: flex; align-items: center; justify-content: flex-end;
            padding: 0 12px; background: #fff; height: 100%; 
        }
        .price-input-wrap { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
        .price-input-wrap input { width: 65px; border: none; outline: none; font-size: 13px; font-weight: 700; color: var(--gov-gray); text-align: right; background: transparent; }
        .price-unit { font-size: 12px; color: var(--gov-gray); font-weight: 700; white-space: nowrap; flex-shrink: 0; }
        .price-slash { color: #e2e8f0; margin: 0 8px; flex-shrink: 0; }
        
        #addressList { 
            position: absolute; top: 100%; left: -2px; width: calc(100% + 4px); 
            border: 2px solid var(--gov-blue); border-top: 1px solid #eee;
            background: white; z-index: 9999; display: none; box-sizing: border-box; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .search-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; text-align: left; color: #333; }
        .search-item.active { background-color: #f0f7ff !important; }

        /* 날짜 비주얼 그래프 영역 (오른쪽 이동) */
        #date-visual-line { 
            visibility: hidden; position: absolute; left: 600px; top: 42px;
            display: flex; align-items: center; width: 450px; height: 50px;
        }
        .line-bar { height: 2px; background: #cbd5e1; flex: 1; position: relative; margin: 0 10px; }
        
        .date-node { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; }
        .node-label { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 800; color: var(--gov-gray); white-space: nowrap; }
        .node-label.first { color: var(--gov-blue); }
        .node-label.future { color: #94a3b8; font-weight: 400; }

        .current-marker { position: absolute; top: -25px; transform: translateX(-50%); padding: 2px 6px; background: var(--gov-red); color: white; font-size: 10px; font-weight: 900; border-radius: 3px; }
        .current-marker::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid var(--gov-red); }

        #result-area { flex: 1; overflow-y: auto; padding: 5px 20px; display: flex; flex-direction: column; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--gov-gray); margin: 15px 0 5px 0; display: flex; align-items: center; gap: 5px; }
        .section-title::before { content: ''; width: 3px; height: 12px; background: var(--gov-blue); }
        .office-card.recommend { border: 2px solid var(--gov-blue); background: #f8fbff; padding: 12px 15px; border-radius: 6px; margin-bottom: 8px; }
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .office-name { font-size: 17px; font-weight: 900; color: var(--gov-blue); }
        .phone-text { font-size: 28px; font-weight: 900; color: var(--gov-red); letter-spacing: -1px; }
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 6px; }
        .contact-item { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; border-bottom: 1px dotted #e2e8f0; }
        .intro-msg { text-align: center; color: #64748b; opacity: 0.5; margin-top: 150px; }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div id="sidebar-search">
        <div class="search-header">
            <h1>관할기관 통합 검색</h1>
            <div class="search-row">
                <div class="search-container">
                    <input id="keyword" placeholder="주소 입력" autocomplete="off" autofocus>
                    <div id="addressList"></div>
                </div>
                <div class="date-container">
                    <div class="date-group">
                        <input type="text" id="yy" maxlength="2" placeholder="YY"><span>.</span>
                        <input type="text" id="mm" maxlength="2" placeholder="MM"><span>.</span>
                        <input type="text" id="dd" maxlength="2" placeholder="DD">
                    </div>
                </div>
                <div class="price-container">
                    <div class="price-input-wrap"><input type="text" id="deposit" placeholder="보증금"><span class="price-unit">만원</span></div>
                    <span class="price-slash">/</span>
                    <div class="price-input-wrap"><input type="text" id="rent" placeholder="월세"><span class="price-unit">만원</span></div>
                </div>
            </div>
            <div id="date-visual-line">
                <div id="timeline-body" class="line-bar"></div>
            </div>
        </div>
        <div id="result-area">
            <div id="rec-section"><p class="intro-msg">주소를 입력해주세요.</p></div>
            <div id="sub-info-area" style="display:none;">
                <div id="office-list"></div>
                <div class="section-title">신청 시 필요 서류</div>
                <div class="info-box">
                    <div class="contact-item"><span>• <b>공통:</b> 신분증, 주민등록초본, 임대차계약서, 등기부등본</span></div>
                </div>
                <div class="section-title">주요 업무 문의처</div>
                <div id="static-contacts" class="info-box"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d791798c38589fc7cdc6bce91d9369be&libraries=services"></script>
<script>
const offices = [
    {name:"한국부동산원 서울동부지사", type:"부동산원", covers:["서울", "도봉구", "강북구", "노원구", "성북구", "중랑구", "동대문구", "성동구", "광진구", "강동구"], lat:37.557698, lng:127.079226, phone:"02-3394-9870~3", address:"서울시 광진구 천호대로 549, 지타워 10층"},
    {name:"한국부동산원 고양지사", type:"부동산원", covers:["경기"], lat:37.652619, lng:126.776883, phone:"031-902-3573~5", address:"경기도 고양시 일산동구 중앙로 1187, 흥국생명빌딩 8층"},
    {name:"한국부동산원 성남지사", type:"부동산원", covers:["경기"], lat:37.411158, lng:127.128242, phone:"031-8017-8488~90", address:"경기도 성남시 분당구 야탑로 81번길 16"},
    {name:"한국부동산원 인천지사", type:"부동산원", covers:["인천"], lat:37.401035, lng:126.712020, phone:"032-429-7041~6", address:"인천시 남동구 논현로 46번길 23, 7층"},
    {name:"한국부동산원 대전지사", type:"부동산원", covers:["세종", "대전"], lat:36.508069, lng:127.261123, phone:"044-868-8341", address:"세종시 한누리대로 499, 세종포스트빌딩 302호"},
    {name:"대한법률구조공단 서울중앙지부", type:"대법공", covers:["서울", "금천구", "관악구", "동작구", "서초구", "강남구", "송파구"], lat:37.494383, lng:127.013104, phone:"02-6941-3430", address:"서울시 서초구 법원로 2길 21, 칠보빌딩 1층"},
    {name:"서울시청 (지자체)", type:"지자체", covers:["서울", "강서구", "은평구", "종로구", "서대문구", "마포구", "영등포구", "양천구", "구로구"], lat:37.564554, lng:126.975613, phone:"02-2133-1200~8", address:"서울시 중구 덕수궁길 15, 서울시청 서소문별관"}
];

let currentAddressResults = [];
let focusedIndex = -1;
let debounceTimer;
const keywordInput = document.getElementById("keyword");
const addressList = document.getElementById("addressList");
const dateInputs = [document.getElementById("yy"), document.getElementById("mm"), document.getElementById("dd")];
const timelineBody = document.getElementById("timeline-body");
const visualLine = document.getElementById("date-visual-line");

// 날짜 계산 및 비주얼 그래프 렌더링 (복구된 핵심 로직)
function calculateTimeline() {
    let y = dateInputs[0].value, m = dateInputs[1].value, d = dateInputs[2].value;
    if (y.length === 2 && m.length === 2 && d.length === 2) {
        let numM = parseInt(m), numD = parseInt(d);
        if (numM < 1 || numM > 12 || numD < 1 || numD > 31) { visualLine.style.visibility = "hidden"; return; }

        let fullYear = parseInt(y) > 50 ? 1900 + parseInt(y) : 2000 + parseInt(y);
        let startDate = new Date(fullYear, numM - 1, numD);
        const now = new Date(2026, 2, 12); // 기준일

        let dates = [new Date(startDate)];
        let temp = new Date(startDate);
        while (temp <= now || dates.length < 2) {
            temp.setFullYear(temp.getFullYear() + 2);
            dates.push(new Date(temp));
            if (dates.length > 5) break; 
        }
        renderTimelineNodes(dates, now);
        visualLine.style.visibility = "visible";
    } else { visualLine.style.visibility = "hidden"; }
}

function renderTimelineNodes(dates, now) {
    timelineBody.innerHTML = "";
    const width = 430; 
    dates.forEach((date, i) => {
        const xPos = (i * (width / (dates.length - 1)));
        const node = document.createElement("div");
        node.className = "date-node";
        node.style.left = `${xPos}px`;
        
        const label = document.createElement("span");
        label.className = `node-label ${i===0?'first':(date>now?'future':'')}`;
        label.innerText = `${String(date.getFullYear()).slice(-2)}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
        node.appendChild(label);
        timelineBody.appendChild(node);

        if (i < dates.length - 1 && now >= dates[i] && now < dates[i+1]) {
            const ratio = (now - dates[i]) / (dates[i+1] - dates[i]);
            const markerX = xPos + ((width / (dates.length - 1)) * ratio);
            const marker = document.createElement("div");
            marker.className = "current-marker";
            marker.style.left = `${markerX}px`;
            marker.innerText = "현재";
            timelineBody.appendChild(marker);
        }
    });
}

// 주소 검색 및 리스트 하이라이트 기능
function searchAddress() {
    const keyword = keywordInput.value.trim();
    if (!keyword || keyword.length < 2) { addressList.style.display = "none"; return; }
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, (result, status) => {
        if (status === kakao.maps.services.Status.OK) {
            currentAddressResults = result;
            addressList.innerHTML = "";
            addressList.style.display = "block";
            focusedIndex = -1;
            result.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerText = item.address_name;
                div.onmousedown = () => selectItem(item);
                addressList.appendChild(div);
            });
        }
    });
}

function selectItem(item) {
    addressList.style.display = "none";
    keywordInput.value = item.address_name;
    document.getElementById("rec-section").style.display = "none";
    document.getElementById("sub-info-area").style.display = "flex";
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
    setTimeout(() => dateInputs[0].focus(), 10);
}

// 거리 계산 및 결과 표시
function findNearest(lat, lng, fullAddress) {
    const addrParts = fullAddress.split(' ');
    const mySido = addrParts[0].substring(0, 2);
    const myGu = addrParts.find(p => p.endsWith('구')) || "";
    
    let filtered = offices.map(o => {
        const d = Math.sqrt(Math.pow(lat-o.lat, 2) + Math.pow(lng-o.lng, 2)) * 111;
        let score = (myGu && o.covers.includes(myGu)) ? 100 : (o.covers.includes(mySido) ? 50 : 0);
        return { ...o, dist: d, score };
    }).filter(o => o.score > 0).sort((a,b) => b.score - a.score || a.dist - b.dist);

    const listDiv = document.getElementById("office-list");
    listDiv.innerHTML = '<span class="section-title">관할기관 안내</span>';
    filtered.slice(0, 2).forEach(o => {
        listDiv.innerHTML += `
            <div class="office-card recommend">
                <div class="card-top">
                    <span class="office-name">${o.name}</span>
                    <span style="font-size:12px; color:var(--gov-light-gray)">${o.dist.toFixed(1)}km</span>
                </div>
                <div class="phone-text">${o.phone}</div>
                <div style="font-size:13px; color:var(--gov-gray); margin-top:5px;">${o.address}</div>
            </div>`;
    });
}

// 이벤트 리스너
keywordInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(searchAddress, 200);
});

keywordInput.addEventListener("keydown", (e) => {
    const items = addressList.getElementsByClassName("search-item");
    if (e.key === "ArrowDown") {
        focusedIndex = (focusedIndex + 1) % items.length;
        updateHighlight(items);
    } else if (e.key === "ArrowUp") {
        focusedIndex = (focusedIndex - 1 + items.length) % items.length;
        updateHighlight(items);
    } else if (e.key === "Enter" && focusedIndex > -1) {
        selectItem(currentAddressResults[focusedIndex]);
    }
});

function updateHighlight(items) {
    Array.from(items).forEach((item, i) => item.classList.toggle("active", i === focusedIndex));
}

dateInputs.forEach((input, idx) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");
        if (input.value.length === 2) {
            if (idx < 2) dateInputs[idx+1].focus();
            else document.getElementById("deposit").focus();
        }
        calculateTimeline();
    });
});

document.addEventListener("click", (e) => {
    if (!e.target.closest('.search-container')) addressList.style.display = "none";
});

// 초기 실행
(function init() {
    const contacts = [
        {l:"한국부동산원", v:"1600-2828"}, {l:"전자계약", v:"1833-4662"}, {l:"임대차신고", v:"1533-2949"}
    ];
    const staticBox = document.getElementById("static-contacts");
    contacts.forEach(c => {
        staticBox.innerHTML += `<div class="contact-item"><span>${c.l}</span><b>${c.v}</b></div>`;
    });
})();
</script>
</body>
</html>
