// 주소 검색 함수
function searchAddress(){
  const keyword = document.getElementById("keyword").value.trim();
  if(!keyword){ alert("검색어를 입력하세요"); return; }

  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(keyword, function(result,status){
    if(status === kakao.maps.services.Status.OK){
      const lat = parseFloat(result[0].y);
      const lng = parseFloat(result[0].x);
      findNearest(lat,lng);
    }else{
      document.getElementById("result").innerHTML="검색 결과가 없습니다";
    }
  });
}

// 거리 계산 함수
function distance(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

// 가장 가까운 기관 찾기
function findNearest(lat,lng){
  const result = offices.map(o=>{
    return {name:o.name,address:o.address,phone:o.phone,dist:distance(lat,lng,o.lat,o.lng)};
  });
  result.sort((a,b)=>a.dist-b.dist);
  const top2 = result.slice(0,2);

  let html="";
  top2.forEach(o=>{
    html += `<h3>${o.name}</h3>주소: ${o.address}<br>전화: ${o.phone}<br>거리: ${o.dist.toFixed(1)} km<br><br>`;
  });

  document.getElementById("result").innerHTML = html;
}
