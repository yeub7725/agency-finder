<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>관할기관 찾기 (최적화 버전)</title>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d791798c38589fc7cdc6bce91d9369be&libraries=services"></script>
<style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; }
    .main-wrapper { display: flex; height: 100vh; }

    /* 왼쪽 1/3 영역 */
    #sidebar-search {
        width: 33.3%;
        min-width: 320px;
        border-right: 1px solid #ddd;
        padding: 30px 15px;
        box-sizing: border-box;
        overflow-y: auto;
        background-color: #f9f9f9;
    }

    #content-area { width: 66.7%; background-color: #fff; }

    h1 { font-size: 1.8rem; margin-bottom: 20px; }

    .search-container { position: relative; width: 100%; }
    input#keyword { 
        padding: 12px; width: 100%; font-size: 16px; 
        border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box;
    }

    /* 주소 후보 리스트 */
    #addressList { 
        position: absolute; top: 100%; left: 0; width: 100%;
        border: 1px solid #ccc; background: white; z-index: 100;
        display: none; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .search-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
    .search-item.active { background-color: #f0f7ff; color: #007bff; }

    /* 결과 내역 카드 */
    #result { margin-top: 30px; }
    .jurisdiction-info { font-weight: bold; color: #d9534f; margin-bottom: 15px; display: block; }

    .office-card { 
        border: 1px solid #e1e1e1; padding: 15px; margin-bottom: 12px; 
        border-radius: 8px; background-color: #fff;
    }
    /* 기관명: 본문 사이즈와 동일하게 */
    .office-card h3 { margin: 0 0 10px 0; font-size: 18px; color: #333; font-weight: bold; }
    
    /* 주소: 한 줄로 표시 */
    .addr-text { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 5px 0; }
    
    /* 전화번호: 폰트 키우고 강조 */
    .phone-text { font-size: 19px; font-weight: bold; color: #0056b3; margin: 5px 0; }
    
    .dist-text { font-size: 14px; color: #888; }
</style>
</head>
<body>

<div class="main-wrapper">
    <div id="sidebar-search">
        <h1>주소지 입력</h1>
        <div class="search-container">
            <input id="keyword" placeholder=" " autocomplete="off">
            <div id="addressList"></div>
        </div>
        <div id="result"></div>
    </div>
    <div id="content-area"></div>
</div>

<script>
const offices = [
    {name:"한국부동산원 서울동부지사", region:"서울", lat:37.5576984952347, lng:127.079226104632, phone:"02-3394-9870~3", address:"서울시 광진구 천호대로 549, 지타워 10층"},
    {name:"한국부동산원 고양지사", region:"경기", lat:37.6526192547913, lng:126.776883538123, phone:"031-902-3573~5", address:"경기도 고양시 일산동구 중앙로 1187, 흥국생명빌딩 8층"},
    {name:"한국부동산원 성남지사", region:"경기", lat:37.4111581198118, lng:127.128242905298, phone:"031-8017-8488~90", address:"경기도 성남시 분당구 야탑로 81번길 16"},
    {name:"한국부동산원 인천지사", region:"인천", lat:37.4010359457774, lng:126.712020985301, phone:"032-429-7041~6", address:"인천시 남동구 논현로 46번길 23, 7층"},
    {name:"한국부동산원 춘천지사", region:"강원", lat:37.8834255926876, lng:127.7299086954, phone:"033-244-9793~4", address:"강원도 춘천시 중앙로 16, 무림빌딩 7층"},
    {name:"한국부동산원 대전지사", region:"세종", lat:36.5080698154972, lng:127.261123189578, phone:"044-868-8341", address:"세종시 한누리대로 499, 세종포스트빌딩 제302호"},
    {name:"한국부동산원 전주지사", region:"전북", lat:35.8376881541845, lng:127.131437613355, phone:"063-276-8022~3", address:"전북 전주시 덕진구 기린대로 405, 한화생명빌딩 3층"},
    {name:"한국부동산원 포항지사", region:"경북", lat:36.0309184846303, lng:129.366140488372, phone:"054-275-9771~2", address:"경북 포항시 북구 중앙로 201, 한화생명빌딩 8층"},
    {name:"한국부동산원 울산지사", region:"울산", lat:35.53823, lng:129.31132, phone:"052-224-8872~4", address:"울산시 남구 북부순환대로 17, 남운프라자 906호"},
    {name:"한국부동산원 창원지사", region:"경남", lat:35.2180660235699, lng:128.675982740931, phone:"055-289-0136~8", address:"창원시 성산구 중앙대로 32, 2층"},
    {name:"한국토지주택공사 충북지역본부", region:"충북", lat:36.6142493811955, lng:127.450780045437, phone:"043-905-1784", address:"충북 청주시 서원구 구룡산로 52번길 2, 303호"},
    {name:"한국토지주택공사 제주지역본부", region:"제주", lat:33.5050626151854, lng:126.525532056896, phone:"064-901-3802", address:"제주시 중앙로 150, 대한항공제주사옥 3층"},
    {name:"대한법률구조공단 서울중앙지부", region:"서울", lat:37.4943835382558, lng:127.013104296206, phone:"02-6941-3430", address:"서울시 서초구 법원로 2길 21, 칠보빌딩 1층"},
    {name:"대한법률구조공단 수원지부", region:"경기", lat:37.2775333113317, lng:127.049515760488, phone:"031-8007-3430", address:"경기도 수원시 영통구 월드컵로 150번길 10, YM빌딩 3층"},
    {name:"대한법률구조공단 대전지부", region:"대전", lat:36.3563094826699, lng:127.387871708301, phone:"042-721-3430", address:"대전시 서구 둔산북로 121, 1층 117~121호"},
    {name:"대한법률구조공단 대구지부", region:"대구", lat:35.8591951058211, lng:128.631891547438, phone:"053-710-3430", address:"대구시 수성구 달구벌대로 2461, 디에스라이프빌딩 3층"},
    {name:"대한법률구조공단 부산지부", region:"부산", lat:35.1907873626204, lng:129.074010929908, phone:"051-711-3430", address:"부산시 연제구 법원남로 15번길 4, 성신프라이어빌딩 5층"},
    {name:"대한법률구조공단 광주지부", region:"광주", lat:35.1491401510105, lng:126.848917597491, phone:"062-710-3430", address:"광주시 서구 상무중앙로 28번길 4, 세진빌딩 4층 401호"},
    {name:"서울시 지자체", region:"서울", lat:37.5645541852439, lng:126.975613605737, phone:"02-2133-1200~8", address:"서울시 중구 덕수궁길 15, 서울시청 서소문별관"},
    {name:"경기도 지자체", region:"경기", lat:37.2746661643172, lng:127.009619860326, phone:"031-8008-2868", address:"경기도 수원시 팔달구 효원로 1"}
];

let focusedIndex = -1;
let currentResults = [];

function getDistance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 주소 검색 (엔터 시 또는 선택 시 실행)
function handleSearch(isEnterPressed) {
    const keyword = document.getElementById("keyword").value.trim();
    const listEl = document.getElementById("addressList");
    if(keyword.length < 2) return;

    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, function(result, status){
        if(status === kakao.maps.services.Status.OK){
            currentResults = result;
            // 1. 결과가 1개뿐인데 엔터를 쳤거나, 이미 정확한 주소인 경우 즉시 출력
            if(result.length === 1) {
                listEl.style.display = "none";
                selectItem(result[0]);
            } 
            // 2. 결과가 여러 개라면 리스트 보여주기
            else {
                listEl.innerHTML = "";
                listEl.style.display = "block";
                result.forEach((item, index) => {
                    const div = document.createElement("div");
                    div.className = "search-item";
                    div.innerHTML = item.address_name;
                    div.onclick = () => selectItem(item);
                    listEl.appendChild(div);
                });
            }
        }
    });
}

function selectItem(item) {
    document.getElementById("addressList").style.display = "none";
    document.getElementById("keyword").value = item.address_name;
    findNearest(parseFloat(item.y), parseFloat(item.x), item.address_name);
}

function findNearest(lat, lng, fullAddress){
    const regionKeyword = fullAddress.split(' ')[0].substring(0, 2);
    const filtered = offices.filter(o => o.region === regionKeyword);
    const targets = filtered.length > 0 ? filtered : offices;

    const sortedResult = targets.map(o => ({
        ...o,
        dist: getDistance(lat, lng, o.lat, o.lng)
    })).sort((a,b) => a.dist - b.dist);

    let html = `<span class="jurisdiction-info">관할지역: ${regionKeyword}</span>`;
    sortedResult.slice(0, 2).forEach(o => {
        html += `
            <div class="office-card">
                <h3>${o.name}</h3>
                <p class="addr-text" title="${o.address}">${o.address}</p>
                <p class="phone-text">${o.phone}</p>
                <p class="dist-text">${o.dist.toFixed(1)} km</p>
            </div>`;
    });
    document.getElementById("result").innerHTML = html;
}

document.addEventListener("DOMContentLoaded", function(){
    const input = document.getElementById("keyword");
    const listEl = document.getElementById("addressList");

    input.addEventListener("keydown", function(e){
        const items = listEl.getElementsByClassName("search-item");
        if (e.key === "Enter") {
            e.preventDefault();
            if (focusedIndex > -1 && items.length > 0) {
                items[focusedIndex].click();
            } else {
                handleSearch(true);
            }
        } else if (listEl.style.display === "block") {
            if (e.key === "ArrowDown") {
                focusedIndex = (focusedIndex + 1) % items.length;
                updateFocus(items);
            } else if (e.key === "ArrowUp") {
                focusedIndex = (focusedIndex - 1 + items.length) % items.length;
                updateFocus(items);
            }
        }
    });

    function updateFocus(items) {
        for (let item of items) item.classList.remove("active");
        if (focusedIndex > -1) {
            items[focusedIndex].classList.add("active");
            items[focusedIndex].scrollIntoView({ block: "nearest" });
        }
    }

    document.addEventListener("click", e => {
        if(e.target.id !== 'keyword') listEl.style.display = "none";
    });
});
</script>
</body>
</html>
