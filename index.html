<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="utf-8">
    <title>관할기관 통합 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: rgb(0, 55, 100);
            --gov-red: rgb(228, 3, 45);
            --gov-gray: rgb(30, 41, 59);
            --gov-light-gray: rgb(100, 116, 139);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background: #fff; }
        .main-wrapper { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar-search { 
            width: 550px; min-width: 550px; border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; background: #fff; height: 100%; position: relative;
        }
        
        .search-header { padding: 8px 20px 50px 20px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; position: relative; z-index: 1000; }
        h1 { font-size: 1.1rem; margin: 0 0 8px 0; color: var(--gov-blue); font-weight: 900; }
        
        .search-row { 
            display: flex; align-items: center; width: 100%; 
            border: 2px solid var(--gov-blue); border-radius: 4px; 
            background: #fff; box-sizing: border-box; height: 40px;
        }
        
        .search-container { flex: 2; position: relative; height: 100%; display: flex; align-items: center; }
        input#keyword { width: 100%; padding: 0 12px; font-size: 14px; border: none; outline: none; background: transparent; }
        
        #addressList { 
            position: absolute; 
            top: calc(100% + 5px); 
            left: -2px; 
            width: 508px; 
            border: 2px solid var(--gov-blue); 
            background: white; z-index: 9999; display: none; box-sizing: border-box; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-height: 300px; overflow-y: auto;
        }
        .search-item { 
            padding: 10px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; text-align: left; color: #333;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .search-item.active { background-color: #e6f0ff !important; color: var(--gov-blue); font-weight: bold; }

        .date-container { flex: 1.2; display: flex; align-items: center; justify-content: center; background: #fff; height: 100%; border-left: 1px solid #eee; border-right: 1px solid #eee; }
        .date-group { display: flex; align-items: center; gap: 1px; }
        .date-group input { width: 25px; border: none !important; text-align: center; font-size: 13px; font-weight: bold; color: var(--gov-blue); outline: none; background: transparent; padding: 0; }
        .date-group span { color: #cbd5e1; font-weight: bold; font-size: 12px; }

        .price-container { flex: 2.5; display: flex; align-items: center; justify-content: flex-end; padding: 0 10px; background: #fff; height: 100%; }
        .price-input-wrap { display: flex; align-items: center; gap: 2px; }
        .price-input-wrap input { width: 65px; border: none; outline: none; font-size: 12px; font-weight: 700; color: var(--gov-gray); text-align: right; background: transparent; }
        .price-unit { font-size: 12px; color: var(--gov-gray); font-weight: 700; }
        .price-slash { color: #e2e8f0; margin: 0 6px; }
        
        /* 날짜 막대바 */
        #date-visual-line { 
            visibility: hidden; position: absolute; left: 50%; bottom: 12px;
            transform: translateX(-50%); display: flex; align-items: center; width: 90%;
        }
        .line-bar { height: 2px; background: var(--gov-blue); flex: 1; position: relative; margin: 0 20px; }
        .line-bar::before, .line-bar::after { content: ''; position: absolute; top: -5px; width: 2px; height: 12px; background: var(--gov-blue); }
        .line-bar::before { left: 0; } .line-bar::after { right: 0; }

        .date-label { font-size: 11px; font-weight: 900; color: var(--gov-blue); position: absolute; top: 12px; white-space: nowrap; transform: translateX(-50%); }
        .date-label.start { left: 20px; } .date-label.end { left: calc(100% - 20px); }

        #result-area { flex: 1; overflow-y: auto; padding: 5px 15px; display: flex; flex-direction: column; }
        .intro-msg { text-align: center; color: #64748b; opacity: 0.5; margin-top: 150px; font-size: 16px; }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div id="sidebar-search">
        <div class="search-header">
            <h1>관할기관 통합 검색</h1>
            <div class="search-row">
                <div class="search-container">
                    <input id="keyword" placeholder="주소 입력" autocomplete="off" autofocus>
                    <div id="addressList"></div>
                </div>
                <div class="date-container">
                    <div class="date-group">
                        <input type="text" id="yy" maxlength="2" placeholder=""><span>.</span>
                        <input type="text" id="mm" maxlength="2" placeholder=""><span>.</span>
                        <input type="text" id="dd" maxlength="2" placeholder="">
                    </div>
                </div>
                <div class="price-container">
                    <div class="price-input-wrap">
                        <input type="text" id="deposit" placeholder="보증금">
                        <span class="price-unit">만원</span>
                    </div>
                    <span class="price-slash">/</span>
                    <div class="price-input-wrap">
                        <input type="text" id="rent" placeholder="월세">
                        <span class="price-unit">만원</span>
                    </div>
                </div>
            </div>
            <div id="date-visual-line">
                <div id="before-date-val" class="date-label start"></div>
                <div class="line-bar"></div>
                <div id="after-date-val" class="date-label end"></div>
            </div>
        </div>
        <div id="result-area">
            <div id="rec-section"><p class="intro-msg">주소를 입력해주세요.</p></div>
            <div id="sub-info-area" style="display:none;">
                <div id="office-list"></div>
                <div id="bottom-static-info">
                    <div class="section-title">신청 시 필요 서류</div>
                    <div class="info-box">
                        <div class="contact-item"><span>• <span style="font-weight:800;">공통:</span> 신분증, 주민등록초본, 임대차계약서, 등기부등본, 건축물대장</span></div>
                        <div class="contact-item"><span>• <span style="font-weight:800;">대리:</span> 위임장, 인감증명서, 대리인 신분증</span></div>
                    </div>
                    <div class="section-title">주요 업무 문의처</div>
                    <div class="info-box">
                        <div class="contact-item"><span class="contact-label">한국부동산원<span class="sub-desc">(1.공시 3.K-아파트 0.기타)</span></span><b>1600-2828</b></div>
                        <div class="contact-item"><span class="contact-label">전자계약</span><b>1833-4662</b></div>
                        <div class="contact-item"><span class="contact-label">임대차신고</span><b>1533-2949</b></div>
                        <div class="contact-item"><span class="contact-label">LH공사</span><b>1600-1004</b></div>
                        <div class="contact-item"><span class="contact-label">렌트홈</span><b>1670-8004</b></div>
                        <div class="contact-item"><span class="contact-label">공동주택 조정위<span class="sub-desc">(장기수선·관리비)</span></span><b>031-738-3300</b></div>
                        <div class="contact-item"><span class="contact-label">국토부</span><b>1599-0001</b></div>
                        <div class="contact-item"><span class="contact-label">대법공</span><b>132</b></div>
                        <div class="contact-item"><span class="contact-label">국세청</span><b>126</b></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d791798c38589fc7cdc6bce91d9369be&libraries=services"></script>

    {name:"한국부동산원 고양지사", type:"부동산원", covers:["경기"], lat:37.652619, lng:126.776883, phone:"031-902-3573~5", address:"경기도 고양시 일산동구 중앙로 1187, 흥국생명빌딩 8층"},

    {name:"한국부동산원 춘천지사", type:"부동산원", covers:["강원"], lat:37.883425, lng:127.729908, phone:"033-244-9793~4", address:"강원도 춘천시 중앙로 16, 무림빌딩 7층"},
    {name:"한국부동산원 대전지사", type:"부동산원", covers:["세종", "대전"], lat:36.508069, lng:127.261123, phone:"044-868-8341", address:"세종시 한누리대로 499, 세종포스트빌딩 302호"},
    {name:"한국부동산원 전주지사", type:"부동산원", covers:["전북"], lat:35.837688, lng:127.131437, phone:"063-276-8022~3", address:"전북 전주시 덕진구 기린대로 405, 한화생명빌딩 3층"},
    {name:"한국부동산원 포항지사", type:"부동산원", covers:["경북"], lat:36.030918, lng:129.366140, phone:"054-275-9771~2", address:"경북 포항시 북구 중앙로 201, 한화생명빌딩 8층"},
    {name:"한국부동산원 울산지사", type:"부동산원", covers:["울산"], lat:35.53823, lng:129.31132, phone:"052-224-8872~4", address:"울산시 남구 북부순환대로 17, 남운프라자 906호"},
    {name:"한국부동산원 창원지사", type:"부동산원", covers:["경남"], lat:35.218066, lng:128.675982, phone:"055-289-0136~8", address:"창원시 성산구 중앙대로 32, 2층"},
    {name:"한국토지주택공사 충북본부", type:"주택공사", covers:["충북"], lat:36.614249, lng:127.450780, phone:"043-905-1784", address:"충북 청주시 서원구 구룡산로 52번길 2, 303호"},
    {name:"한국토지주택공사 제주본부", type:"주택공사", covers:["제주"], lat:33.505062, lng:126.525532, phone:"064-901-3802", address:"제주시 중앙로 150, 대한항공제주사옥 3층"},
    {name:"대한법률구조공단 서울중앙지부", type:"대법공", covers:["서울", "금천구", "관악구", "동작구", "서초구", "강남구", "송파구"], lat:37.494383, lng:127.013104, phone:"02-6941-3430", address:"서울시 서초구 법원로 2길 21, 칠보빌딩 1층"},
    {name:"대한법률구조공단 수원지부", type:"대법공", covers:["경기", "인천"], lat:37.277533, lng:127.049515, phone:"031-8007-3430", address:"경기도 수원시 영통구 월드컵로 150번길 10, YM빌딩 3층"},
    {name:"대한법률구조공단 대전지부", type:"대법공", covers:["대전", "세종", "충남", "충북"], lat:36.356309, lng:127.387871, phone:"042-721-3430", address:"대전시 서구 둔산북로 121, 1층 117~121호"},
    {name:"대한법률구조공단 대구지부", type:"대법공", covers:["대구", "경북"], lat:35.859195, lng:128.631891, phone:"053-710-3430", address:"대구시 수성구 달구벌대로 2461, 디에스라이프빌딩 3층"},
    {name:"대한법률구조공단 부산지부", type:"대법공", covers:["부산", "울산", "경남"], lat:35.190787, lng:129.074010, phone:"051-711-3430", address:"부산시 연제구 법원남로 15번길 4, 성신프라이어빌딩 5층"},
    {name:"대한법률구조공단 광주지부", type:"대법공", covers:["광주", "전남", "전북", "제주"], lat:35.149140, lng:126.848917, phone:"062-710-3430", address:"광주시 서구 상무중앙로 28번길 4, 세진빌딩 4층 401호"},
    {name:"서울시청 (지자체)", type:"지자체", covers:["서울", "강서구", "은평구", "종로구", "서대문구", "마포구", "영등포구", "양천구", "구로구"], lat:37.564554, lng:126.975613, phone:"02-2133-1200~8", address:"서울시 중구 덕수궁길 15, 서울시청 서소문별관"},
    {name:"경기도청 (지자체)", type:"지자체", covers:["경기"], lat:37.274666, lng:127.009619, phone:"031-8008-2868", address:"경기도 수원시 팔달구 효원로 1"}
];

let currentAddressResults = [];
let focusedIndex = -1;
let isKeyboardNavigating = false;
const keywordInput = document.getElementById("keyword");
const addressList = document.getElementById("addressList");

function updateDateVisual() {
    const yy = document.getElementById("yy").value;
    const mm = document.getElementById("mm").value;
    const dd = document.getElementById("dd").value;
    const visualLine = document.getElementById("date-visual-line");

    if (yy.length === 2 && mm.length === 2 && dd.length === 2) {
        const fullYear = "20" + yy;
        const inputDate = new Date(`${fullYear}-${mm}-${dd}`);
        if (!isNaN(inputDate.getTime())) {
            visualLine.style.visibility = "visible";
            document.getElementById("before-date-val").innerText = `오늘 (${new Date().toLocaleDateString()})`;
            document.getElementById("after-date-val").innerText = `계약일 (${inputDate.toLocaleDateString()})`;
        }
    } else {
        visualLine.style.visibility = "hidden";
    }
}

document.querySelectorAll(".date-group input").forEach(input => {
    input.addEventListener("input", updateDateVisual);
});


function searchAddress() {
    const keyword = keywordInput.value.trim();
    if (keyword.length < 2) { addressList.style.display = "none"; return; }
    
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(keyword, (result, status) => {
        if (status === kakao.maps.services.Status.OK) {
            currentAddressResults = result;
            addressList.innerHTML = "";
            addressList.style.display = "block";
            
            // 키보드 조작 중이 아닐 때만 인덱스 초기화
            if (!isKeyboardNavigating) focusedIndex = -1;

            result.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerText = item.address_name;
                div.onmouseover = () => { 
                    focusedIndex = idx; 
                    isKeyboardNavigating = false;
                    updateHighlight(); 
                };
                div.onmousedown = (e) => {
                    e.preventDefault();
                    selectItem(item);
                };
                addressList.appendChild(div);
            });
            if (isKeyboardNavigating) updateHighlight();
        }
    });
}

function updateHighlight() {
    const items = addressList.getElementsByClassName("search-item");
    Array.from(items).forEach((item, i) => {
        item.classList.toggle("active", i === focusedIndex);
        if (i === focusedIndex) {
            item.scrollIntoView({ block: 'nearest' });
        }
    });
}

function selectItem(item) {
    keywordInput.value = item.address_name;
    addressList.style.display = "none";
    document.getElementById("rec-section").style.display = "none";
    document.getElementById("sub-info-area").style.display = "flex";

}

keywordInput.addEventListener("input", () => {
    isKeyboardNavigating = false;
    searchAddress();
});

keywordInput.addEventListener("keydown", (e) => {
    const items = addressList.getElementsByClassName("search-item");
    if (!items.length || addressList.style.display === "none") return;

    if (e.key === "ArrowDown") {
        e.preventDefault();
        isKeyboardNavigating = true;
        focusedIndex = (focusedIndex + 1) % items.length;
        updateHighlight();
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        isKeyboardNavigating = true;
        focusedIndex = (focusedIndex - 1 + items.length) % items.length;
        updateHighlight();
    } else if (e.key === "Enter") {
        if (focusedIndex > -1) {
            e.preventDefault();
            selectItem(currentAddressResults[focusedIndex]);
        }
    }
});

document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-container")) {
        addressList.style.display = "none";
    }
});
</script>
</body>
</html>
